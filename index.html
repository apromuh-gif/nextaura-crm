function kpiCard(label, value, sub, color, icon) {
  return h('div',{style:{background:'#ffffff',border:`2px solid ${color}44`,borderRadius:'14px',padding:'18px 20px',boxShadow:'0 2px 8px rgba(30,58,95,.08)'}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'8px'}},
      h('div',{style:{fontSize:'11px',color:T3,textTransform:'uppercase',letterSpacing:'.06em',fontWeight:'700'}},label),
      h('div',{style:{fontSize:'20px'}},icon)
    ),
    h('div',{style:{fontSize:'24px',fontWeight:'800',color,marginBottom:'4px'}},value),
    h('div',{style:{fontSize:'12px',color:T3}},sub)
  );
}

function card(title, content, extra={}) {
  return h('div',{style:{background:'#edf5fc',border:'1px solid #b0c8e0',borderRadius:'14px',boxShadow:'0 2px 8px rgba(20,40,80,.08)',padding:'20px',...extra}},
    h('h3',{style:{fontSize:'14px',fontWeight:'700',marginBottom:'16px',color:'#1e2d4a',borderBottom:'1px solid #c0d8f0',paddingBottom:'10px'}},title),
    content
  );
}

function barChart(items, maxVal, colorFn, labelFn, valueFn, subFn) {
  const div = h('div',{});
  if(!items.length) { div.appendChild(h('div',{style:{color:T3,fontSize:'13px',textAlign:'center',padding:'20px'}},'Veri yok.')); return div; }
  items.forEach(item => {
    const pct = maxVal > 0 ? (valueFn(item)/maxVal*100) : 0;
    const bar = h('div',{style:{marginBottom:'12px'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'5px'}},
        h('span',{style:{fontSize:'13px',color:T1,fontWeight:'600'}},labelFn(item)),
        h('div',{style:{display:'flex',gap:'12px',alignItems:'center'}},
          subFn ? h('span',{style:{fontSize:'11px',color:T3}},subFn(item)) : h('span'),
          h('span',{style:{fontSize:'13px',fontWeight:'700',color:colorFn(item)}},eur(valueFn(item)))
        )
      ),
      h('div',{style:{height:'8px',background:'#c8daea',borderRadius:'4px',overflow:'hidden'}},
        h('div',{style:{height:'100%',width:pct+'%',background:colorFn(item),borderRadius:'4px',transition:'width .4s ease'}})
      )
    );
    div.appendChild(bar);
  });
  return div;
}

function pieChart(segments, size=120) {
  const total = segments.reduce((a,s)=>a+s.value,0);
  if(!total) return h('div',{style:{color:T3,fontSize:'13px',textAlign:'center',padding:'16px'}},'Veri yok.');
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 36 36');
  svg.setAttribute('width',size); svg.setAttribute('height',size);
  svg.style.transform = 'rotate(-90deg)';
  let offset = 0;
  segments.filter(s=>s.value>0).forEach(s => {
    const pct = s.value/total*100;
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx','18'); circle.setAttribute('cy','18'); circle.setAttribute('r','15.9');
    circle.setAttribute('fill','none'); circle.setAttribute('stroke',s.color);
    circle.setAttribute('stroke-width','3.2');
    circle.setAttribute('stroke-dasharray',`${pct} ${100-pct}`);
    circle.setAttribute('stroke-dashoffset',String(-offset));
    svg.appendChild(circle);
    offset += pct;
  });
  const legend = h('div',{style:{display:'flex',flexDirection:'column',gap:'6px',flex:'1'}});
  segments.filter(s=>s.value>0).forEach(s => {
    legend.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
      h('div',{style:{width:'10px',height:'10px',borderRadius:'3px',background:s.color,flexShrink:'0'}}),
      h('div',{style:{flex:'1'}},
        h('div',{style:{fontSize:'12px',fontWeight:'600',color:T1}},s.label),
        h('div',{style:{fontSize:'11px',color:T3}},Math.round(s.value/total*100)+'% · '+eur(s.value))
      )
    ));
  });
  return h('div',{style:{display:'flex',alignItems:'center',gap:'20px',flexWrap:'wrap'}},svg,legend);
}

function miniTable(headers, rows) {
  const thead = h('thead',{},h('tr',{style:{background:'#1e2d4a'}},
    ...headers.map(hh=>h('th',{style:{color:'#fff',padding:'9px 12px',fontSize:'11px',fontWeight:'700',textAlign:'left',whiteSpace:'nowrap'}},hh))
  ));
  const tbody = h('tbody',{});
  if(!rows.length) {
    tbody.appendChild(h('tr',{},h('td',{colspan:String(headers.length),style:{padding:'20px',textAlign:'center',color:T3,fontSize:'13px'}},'Veri yok.')));
  }
  rows.forEach((row,i) => {
    const tr = h('tr',{style:{background:i%2===0?'#ffffff':'#f0f5fc'},className:'rh'});
    row.forEach(cell => tr.appendChild(h('td',{style:{padding:'9px 12px',fontSize:'13px',borderTop:'1px solid #d0daea'}},cell)));
    tbody.appendChild(tr);
  });
  return h('div',{style:{overflowX:'auto'}},h('table',{style:{width:'100%',borderCollapse:'collapse',minWidth:'400px'}},thead,tbody));
}

function renderDashboardAdmin() {
  const O = state.opportunities;
  const P = state.proposals;
  const S = state.services;
  const M = state.maintenances;
  const LOST = ["KAÇTI","NO GO","FIRSAT ÖLDÜ"];

  // Tarih aralığı filtresi
  if(!state.adminDateFrom) state.adminDateFrom = '';
  if(!state.adminDateTo) state.adminDateTo = '';

  // Tarihe göre filtrele
  const OF = O.filter(o=>{
    if(!state.adminDateFrom && !state.adminDateTo) return true;
    const d = new Date(o.createdAt||o.updatedAt||'2020-01-01');
    if(state.adminDateFrom && d < _toDate(state.adminDateFrom)) return false;
    if(state.adminDateTo && d > _toDate(state.adminDateTo)) return false;
    return true;
  });

  const totalPipeline = OF.filter(o=>!LOST.includes(o.stage)).reduce((a,o)=>a+(Number(o.value)||0),0);
  const totalAll = OF.reduce((a,o)=>a+(Number(o.value)||0),0);
  const won = OF.filter(o=>o.stage==='KAZANILDI').reduce((a,o)=>a+(Number(o.value)||0),0);
  const lost = OF.filter(o=>LOST.includes(o.stage)).length;
  const totalCount = OF.length;
  const avgDeal = totalCount ? totalAll/totalCount : 0;
  const winRate = totalCount ? Math.round(OF.filter(o=>o.stage==='KAZANILDI').length/totalCount*100) : 0;
  const serviceTotal = S.reduce((a,s)=>a+(Number(s.amount)||0),0);
  const compTarget = (state.targets&&state.targets.company)||0;
  const targetPct = compTarget>0?Math.min(100,Math.round(won/compTarget*100)):0;

  // KPI Kartları
  const kpiGrid = h('div',{style:{display:'grid',gridTemplateColumns:window.innerWidth<=480?'1fr 1fr':'repeat(auto-fit,minmax(180px,1fr))',gap:window.innerWidth<=768?'10px':'14px',marginBottom:window.innerWidth<=768?'14px':'20px'}});
  [
    {l:'Toplam Pipeline',v:eur(totalPipeline),s:OF.filter(o=>!LOST.includes(o.stage)).length+' aktif fırsat',c:'#2563eb',i:'🎯'},
    {l:'Satış Tutarı',v:eur(won),s:'Kazanılan toplam ciro',c:'#7c3aed',i:'💰'},
    {l:'Win Rate',v:winRate+'%',s:OF.filter(o=>o.stage==='KAZANILDI').length+' kazanılan / '+totalCount+' toplam',c:'#16a34a',i:'🏆'},
    {l:'Şirket Yıllık Hedef',v:eur(compTarget),s:'Hedefe ulaşma: '+(compTarget>0?targetPct+'%':'Hedef girilmedi'),c:'#0891b2',i:'🎯'},
    {l:'Kaybedilen Fırsat',v:String(lost),s:'KAÇTI + NO GO + ÖLDÜ',c:'#dc2626',i:'❌'},
    {l:'Teknik Servis Ciro',v:eur(serviceTotal),s:S.length+' kayıt',c:'#ea580c',i:'🔧'},
  ].forEach(k=>kpiGrid.appendChild(kpiCard(k.l,k.v,k.s,k.c,k.i)));

  // Tarih aralığı filtre kutusu
  const dateFilterBox = h('div',{style:{background:'#ffffff',border:'1px solid #d0daea',borderRadius:'12px',padding:'12px 14px',marginBottom:'16px'}},
    h('div',{style:{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}},
      h('span',{style:{fontSize:'13px',fontWeight:'600',color:'#1e2d4a',whiteSpace:'nowrap'}},'📅 Tarih Aralığı:'),
      h('input',{type:'date',value:state.adminDateFrom||'',style:{padding:'7px 10px',border:'1.5px solid #b8d4ec',borderRadius:'8px',fontSize:'13px',fontFamily:"'Inter',sans-serif",color:'#0f1f35',outline:'none',flex:'1',minWidth:'130px'},
        oninput:e=>{state.adminDateFrom=e.target.value;render();}}),
      h('span',{style:{color:'#64748b',fontSize:'13px'}},'—'),
      h('input',{type:'date',value:state.adminDateTo||'',style:{padding:'7px 10px',border:'1.5px solid #b8d4ec',borderRadius:'8px',fontSize:'13px',fontFamily:"'Inter',sans-serif",color:'#0f1f35',outline:'none',flex:'1',minWidth:'130px'},
        oninput:e=>{state.adminDateTo=e.target.value;render();}}),
      btn('Temizle',()=>{state.adminDateFrom='';state.adminDateTo='';render();},'#f1f5f9','#4a6080','7px 12px',{fontSize:'12px',border:'1px solid #b0c8e0',borderRadius:'8px'}),
      (state.adminDateFrom||state.adminDateTo)?h('span',{style:{fontSize:'12px',color:'#2563eb',fontWeight:'600'}},OF.length+' / '+O.length+' fırsat gösteriliyor'):h('span')
    )
  );

  // Aşama Bazlı Ciro Grafiği

// ═══════════════════════════════════════════════════════
// B — SATIŞ / PROJE DASHBOARD
// ═══════════════════════════════════════════════════════
function renderDashboardSales() {
  const O = state.opportunities;
  const P = state.proposals;
  const cu = state.currentUser;
  const LOST = ["KAÇTI","NO GO","FIRSAT ÖLDÜ"];

  // Tarih filtresi
  if(!state.salesDateFrom) state.salesDateFrom = '';
  if(!state.salesDateTo) state.salesDateTo = '';

  // Kullanıcı kendi fırsatları + tarih filtresi
  const baseO = cu?.isAdmin ? O : O.filter(o=>o.assignedTo===cu?.displayName);
  const myO = baseO.filter(o=>{
    if(!state.salesDateFrom && !state.salesDateTo) return true;
    const d = new Date(o.createdAt||o.updatedAt||'2020-01-01');
    if(state.salesDateFrom && d < _toDate(state.salesDateFrom)) return false;
    if(state.salesDateTo && d > _toDate(state.salesDateTo)) return false;
    return true;
  });
  const myP = cu?.isAdmin ? P : P.filter(p=>p.createdBy===cu?.displayName||p.assignedTo===cu?.displayName);

  const myPipeline = myO.filter(o=>!LOST.includes(o.stage)).reduce((a,o)=>a+(Number(o.value)||0),0);
  const myWon = myO.filter(o=>o.stage==='KAZANILDI').length;
  const myLostCount = myO.filter(o=>LOST.includes(o.stage)).length;
  const myTotal = myO.length;
  const hitRateDenom = myWon + myLostCount;
  const hitRate = hitRateDenom > 0 ? Math.round(myWon / hitRateDenom * 100) : 0;
  const myAvg = myTotal ? myO.reduce((a,o)=>a+(Number(o.value)||0),0)/myTotal : 0;
  const myProposalWon = myP.filter(p=>p.status==='Onaylandı').reduce((a,p)=>a+(Number(p.amount)||0),0);

  // ── repTarget: Firebase'den gelen reps objesinde key ara ──
  const cuName = (cu && cu.displayName) ? cu.displayName.trim() : '';
  let repTarget = 0;
  if(cuName && state.targets && state.targets.reps) {
    const reps = state.targets.reps;
    const repsKeys = Object.keys(reps);
    // 1. Birebir eşleşme
    if(reps[cuName] !== undefined) {
      repTarget = Number(reps[cuName]) || 0;
    }
    if(!repTarget) {
      // 2. Trim + lowercase
      const found = repsKeys.find(k => k.trim().toLowerCase() === cuName.toLowerCase());
      if(found) repTarget = Number(reps[found]) || 0;
    }
    if(!repTarget) {
      // 3. İlk kelime eşleşmesi
      const firstName = cuName.split(' ')[0].toLowerCase();
      const found2 = repsKeys.find(k => k.trim().toLowerCase().startsWith(firstName));
      if(found2) repTarget = Number(reps[found2]) || 0;
    }
  }
  const myWonVal = myO.filter(o=>o.stage==='KAZANILDI').reduce((a,o)=>a+(Number(o.value)||0),0);

  // Tarih filtresi kutusu
  const salesDateBox = h('div',{style:{background:'#ffffff',border:'1px solid #d0daea',borderRadius:'12px',padding:'14px 18px',marginBottom:'16px',display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap'}},
    h('span',{style:{fontSize:'13px',fontWeight:'600',color:'#1e2d4a'}},'📅 Tarih Aralığı:'),
    h('input',{type:'date',value:state.salesDateFrom||'',style:{padding:'7px 10px',border:'1.5px solid #b8d4ec',borderRadius:'8px',fontSize:'13px',fontFamily:"'Inter',sans-serif",color:'#0f1f35',outline:'none'},oninput:e=>{state.salesDateFrom=e.target.value;render();}}),
    h('span',{style:{color:'#64748b',fontSize:'13px'}},'—'),
    h('input',{type:'date',value:state.salesDateTo||'',style:{padding:'7px 10px',border:'1.5px solid #b8d4ec',borderRadius:'8px',fontSize:'13px',fontFamily:"'Inter',sans-serif",color:'#0f1f35',outline:'none'},oninput:e=>{state.salesDateTo=e.target.value;render();}}),
    btn('Temizle',()=>{state.salesDateFrom='';state.salesDateTo='';render();},'#f1f5f9','#4a6080','7px 14px',{fontSize:'12px',border:'1px solid #b0c8e0',borderRadius:'8px'}),
    (state.salesDateFrom||state.salesDateTo)?h('span',{style:{fontSize:'12px',color:'#2563eb',fontWeight:'600'}},myO.length+' / '+baseO.length+' fırsat gösteriliyor'):h('span')
  );

  // KPI
  const kpiGrid = h('div',{style:{display:'grid',gridTemplateColumns:window.innerWidth<=480?'1fr 1fr':'repeat(auto-fit,minmax(180px,1fr))',gap:window.innerWidth<=768?'10px':'14px',marginBottom:window.innerWidth<=768?'14px':'20px'}});
  [

                h('span',{style:{fontWeight:'600',fontSize:'13px',color:'#1e2d4a'}},u.displayName)
              ),
              h('div',{style:{textAlign:'right'}},

                h('span',{style:{fontSize:'11px',color:'#4a6080',marginLeft:'6px'}},eur(w)+' / '+eur(t))
              )
            ),
            h('div',{style:{height:'10px',background:'#c8daea',borderRadius:'5px',overflow:'hidden'}},
              h('div',{style:{height:'100%',width:p2+'%',background:p2>=100?'linear-gradient(90deg,#16a34a,#22c55e)':p2>=50?'linear-gradient(90deg,#d97706,#fbbf24)':'linear-gradient(90deg,#2563eb,#60a5fa)',borderRadius:'5px',transition:'width .5s ease'}})
            )
          ));
        });
        return div;
      })())
    ),
    h('div',{style:{marginBottom:'16px'}},
      card('🔧 Temsilci Bazlı T.Servis Hedef Gerçekleşme', (()=>{
        const svcDiv = h('div',{});
        const svcReps = (state.targets&&state.targets.serviceReps)||{};

        if(!repsToShow.length) { svcDiv.appendChild(h('div',{style:{color:T3,textAlign:'center',padding:'20px',fontSize:'13px'}},'Satış temsilcisi bulunamadı.')); return svcDiv; }
        repsToShow.forEach(u=>{
          let t = 0;
          // Güvenli key arama
          const srKeys = Object.keys(svcReps);
          for(let ki=0;ki<srKeys.length;ki++){
            const k=srKeys[ki]; const v=Number(svcReps[k])||0;
            if(!v) continue;
            if(k===u.displayName||k.toLowerCase()===u.displayName.toLowerCase()||k.replace(/\s+/g,'')===u.displayName.replace(/\s+/g,'')) { t=v; break; }
          }
          const w2 = state.services.filter(s=>s.assignedTo===u.displayName&&s.status==='Onaylandı').reduce((a,s)=>a+(Number(s.amount)||0),0);
          const p3 = t>0?Math.min(100,Math.round(w2/t*100)):0;
          svcDiv.appendChild(h('div',{style:{marginBottom:'14px'}},
            h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'5px'}},
              h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
                h('div',{style:{width:'26px',height:'26px',borderRadius:'50%',background:'linear-gradient(135deg,#0891b2,#06b6d4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'10px',fontWeight:'700',color:'#fff'}},u.displayName.split(' ').map(n=>n[0]).join('').slice(0,2)),
                h('span',{style:{fontWeight:'600',fontSize:'13px',color:'#1e2d4a'}},u.displayName)
              ),
              h('div',{style:{textAlign:'right'}},
                h('span',{style:{fontSize:'18px',fontWeight:'900',color:p3>=100?'#16a34a':p3>=50?'#d97706':'#0891b2'}},t?p3+'%':'-'),
                h('span',{style:{fontSize:'11px',color:'#4a6080',marginLeft:'8px'}},eur(w2)+(t?' / '+eur(t):' (Hedef girilmemiş)'))
              )

              h('div',{style:{height:'100%',width:p3+'%',background:p3>=100?'linear-gradient(90deg,#16a34a,#22c55e)':p3>=50?'linear-gradient(90deg,#d97706,#fbbf24)':'linear-gradient(90deg,#0891b2,#22d3ee)',borderRadius:'5px',transition:'width .5s ease'}})
            ):h('span')
          ));
        });
        return svcDiv;

    ),

    cu?.isAdmin ? h('div',{style:{marginTop:'16px'}},
      card('🏹 Satış Temsilcisi Bazlı Hit Rate', (()=>{

        state.users.filter(u=>u.active!==false&&u.hasTarget!==false).forEach(u=>{

          const won = repO.filter(o=>o.stage==='KAZANILDI').length;
          const lost = repO.filter(o=>LOST.includes(o.stage)).length;
          const denom = won + lost;
          const rate = denom > 0 ? Math.round(won/denom*100) : 0;
          div.appendChild(h('div',{style:{marginBottom:'14px'}},
            h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'5px'}},
              h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
                h('div',{style:{width:'28px',height:'28px',borderRadius:'50%',background:'linear-gradient(135deg,#2563eb,#7c3aed)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:'700',color:'#fff'}},u.displayName.split(' ').map(n=>n[0]).join('').slice(0,2)),
                h('span',{style:{fontWeight:'600',fontSize:'14px',color:'#1e2d4a'}},u.displayName)
              ),
              h('div',{style:{display:'flex',alignItems:'center',gap:'12px'}},

}

// ═══════════════════════════════════════════════════════
// C — PAZARLAMA / İŞ GELİŞTİRME DASHBOARD
// ═══════════════════════════════════════════════════════
function renderDashboardMarketing() {
  const O_ALL = state.opportunities;
  const C = state.customers;
  const LOST = ["KAÇTI","NO GO","FIRSAT ÖLDÜ"];

  // Tarih filtresi
  if(!state.mktDateFrom) state.mktDateFrom = '';
  if(!state.mktDateTo) state.mktDateTo = '';
  const O = O_ALL.filter(o=>{
    if(!state.mktDateFrom && !state.mktDateTo) return true;
    const d = new Date(o.createdAt||o.updatedAt||'2020-01-01');
    if(state.mktDateFrom && d < _toDate(state.mktDateFrom)) return false;
    if(state.mktDateTo && d > _toDate(state.mktDateTo)) return false;
    return true;
  });

  // Tarih filtresi kutusu
  const mktDateBox = h('div',{style:{background:'#ffffff',border:'1px solid #d0daea',borderRadius:'12px',padding:'14px 18px',marginBottom:'16px',display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap'}},
    h('span',{style:{fontSize:'13px',fontWeight:'600',color:'#1e2d4a'}},'📅 Tarih Aralığı:'),
    h('input',{type:'date',value:state.mktDateFrom||'',style:{padding:'7px 10px',border:'1.5px solid #b8d4ec',borderRadius:'8px',fontSize:'13px',fontFamily:"'Inter',sans-serif",color:'#0f1f35',outline:'none'},oninput:e=>{state.mktDateFrom=e.target.value;render();}}),
    h('span',{style:{color:'#64748b',fontSize:'13px'}},'—'),
    h('input',{type:'date',value:state.mktDateTo||'',style:{padding:'7px 10px',border:'1.5px solid #b8d4ec',borderRadius:'8px',fontSize:'13px',fontFamily:"'Inter',sans-serif",color:'#0f1f35',outline:'none'},oninput:e=>{state.mktDateTo=e.target.value;render();}}),
    btn('Temizle',()=>{state.mktDateFrom='';state.mktDateTo='';render();},'#f1f5f9','#4a6080','7px 14px',{fontSize:'12px',border:'1px solid #b0c8e0',borderRadius:'8px'}),
    (state.mktDateFrom||state.mktDateTo)?h('span',{style:{fontSize:'12px',color:'#2563eb',fontWeight:'600'}},O.length+' / '+O_ALL.length+' fırsat gösteriliyor'):h('span')
  );

  // KPI
  const totalFirms = C.length;
  const newFirms = C.filter(c=>c.createdAt&&new Date(c.createdAt)>=new Date(Date.now()-30*86400000)).length;
  const activePipeline = O.filter(o=>!LOST.includes(o.stage)).reduce((a,o)=>a+(Number(o.value)||0),0);
  const lostCount = O.filter(o=>LOST.includes(o.stage)).length;
  const totalCount = O.length;
  const lostRate = totalCount ? Math.round(lostCount/totalCount*100) : 0;
  const pubSector = O.filter(o=>o.adminId&&state.customers.find(c=>c.id===o.customerId)?.sector==='KAMU').length;

  const kpiGrid = h('div',{style:{display:'grid',gridTemplateColumns:window.innerWidth<=480?'1fr 1fr':'repeat(auto-fit,minmax(180px,1fr))',gap:window.innerWidth<=768?'10px':'14px',marginBottom:window.innerWidth<=768?'14px':'20px'}});
  [
    {l:'Toplam Firma',v:String(totalFirms),s:newFirms+' yeni (son 30 gün)',c:'#2563eb',i:'🏢'},
    {l:'Aktif Pipeline',v:eur(activePipeline),s:O.filter(o=>!LOST.includes(o.stage)).length+' fırsat',c:'#7c3aed',i:'🎯'},
    {l:'Kayıp Oranı',v:lostRate+'%',s:lostCount+' kaybedilen / '+totalCount+' toplam',c:'#dc2626',i:'📉'},
    {l:'Toplam Fırsat',v:String(totalCount),s:'Tüm zamanlar',c:'#16a34a',i:'📊'},
    {l:'Sektör Çeşitliliği',v:String(new Set(O.map(o=>o.sector)).size),s:'Farklı sektör',c:'#0891b2',i:'🌐'},
    {l:'Teknik Servis Kayıt',v:String(state.services.length),s:'Toplam servis kaydı',c:'#ea580c',i:'🔧'},
  ].forEach(k=>kpiGrid.appendChild(kpiCard(k.l,k.v,k.s,k.c,k.i)));

  // Sektör bazlı dağılım
  const sectorMap = {};
  O.forEach(o=>{ const s=o.sector||'Diğer'; if(!sectorMap[s]) sectorMap[s]={val:0,cnt:0}; sectorMap[s].val+=Number(o.value)||0; sectorMap[s].cnt++; });
  const sectorItems = Object.entries(sectorMap).sort((a,b)=>b[1].val-a[1].val).map(([s,d])=>({sector:s,...d}));
  const maxSec = Math.max(1,...sectorItems.map(x=>x.val));
  const SECT_COLORS = ['#2563eb','#7c3aed','#ea580c','#16a34a','#0891b2','#dc2626','#d97706','#475569'];
  const sectorChart = barChart(sectorItems, maxSec, (x,i)=>SECT_COLORS[sectorItems.indexOf(x)%SECT_COLORS.length], x=>x.sector, x=>x.val, x=>x.cnt+'x');
  const sectorPie = pieChart(sectorItems.slice(0,6).map((x,i)=>({label:x.sector, value:x.val, color:SECT_COLORS[i%SECT_COLORS.length]})));

  // Kayıp analizi
  const lostReasons = {};
  O.filter(o=>LOST.includes(o.stage)).forEach(o=>{ const s=o.stage; lostReasons[s]=(lostReasons[s]||0)+1; });
  const lostPie = pieChart(Object.entries(lostReasons).map(([s,v])=>({label:s,value:v,color:SC[s]||'#94a3b8'})));

  // İdare bazlı dağılım (Kamu/Özel)
  const adminMap = {};
  O.forEach(o=>{ const a=o.sector||'Belirsiz'; if(!adminMap[a]) adminMap[a]={val:0,cnt:0}; adminMap[a].val+=Number(o.value)||0; adminMap[a].cnt++; });
  const ADMIN_COLORS = ['#1d4ed8','#0891b2','#16a34a','#d97706','#7c3aed','#dc2626','#475569','#0f766e'];
  const adminPie = pieChart(
    Object.entries(adminMap).sort((a,b)=>b[1].val-a[1].val).slice(0,5).map(([s,d],i)=>({label:s,value:d.val,color:ADMIN_COLORS[i%ADMIN_COLORS.length]}))
  );

  // Yeni müşteri kazanımı (son 6 ay) — firma isimleriyle
  const months = [];
  for(let i=5;i>=0;i--) { const d=new Date(); d.setMonth(d.getMonth()-i); months.push({label:d.toLocaleString('tr-TR',{month:'short',year:'2-digit'}),year:d.getFullYear(),month:d.getMonth()}); }
  const newCustByMonth = months.map(m=>{
    const firms = C.filter(c=>{ if(!c.createdAt) return false; const d=new Date(c.createdAt); return d.getFullYear()===m.year&&d.getMonth()===m.month; });
    return {label:m.label, cnt:firms.length, firms:firms.map(f=>f.firmName||f.name||'?')};
  });
  const maxCust = Math.max(1,...newCustByMonth.map(x=>x.cnt));

  // Müşteri grafiği — tıklanabilir
  const custChartDiv = h('div',{});
  if(!state.custMonthOpen) state.custMonthOpen = {};
  newCustByMonth.forEach(item=>{
    const pct = item.cnt/maxCust*100;
    const isOpen = !!state.custMonthOpen[item.label];
    const toggleOpen = () => { state.custMonthOpen[item.label] = !isOpen; render(); };
    const firmPanel = isOpen && item.firms.length ? h('div',{style:{background:'#f0f7ff',border:'1px solid #b8d4ec',borderRadius:'10px',padding:'12px 16px',marginTop:'8px'}},
      h('div',{style:{fontWeight:'700',fontSize:'12px',color:'#1e2d4a',marginBottom:'8px'}},'📋 '+item.label+' — Yeni Firmalar ('+item.cnt+'):'),
      h('div',{style:{display:'flex',flexWrap:'wrap',gap:'6px'}},
        ...item.firms.map(f=>h('span',{style:{background:'#dbeafe',color:'#1d4ed8',borderRadius:'7px',padding:'4px 10px',fontSize:'12px',fontWeight:'600'}},f))
      )
    ) : null;
    const bar = h('div',{style:{marginBottom:'8px'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'5px',cursor:item.cnt?'pointer':'default',padding:'8px 10px',borderRadius:'9px',background:isOpen?'#e8f0fb':'transparent'},
        onClick:item.cnt?toggleOpen:null},
        h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
          h('span',{style:{fontSize:'13px',color:'#2563eb'}},item.cnt?'▶':'—'),
          h('span',{style:{fontSize:'13px',color:T1,fontWeight:'600'}},item.label)
        ),
        h('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},
          item.cnt?h('span',{style:{fontSize:'12px',color:'#2563eb'}},isOpen?'Gizle ▲':'Firmaları Gör ▼'):h('span'),
          h('span',{style:{fontSize:'14px',fontWeight:'800',color:item.cnt?'#2563eb':T4}},item.cnt?item.cnt+' Firma':'0')
        )
      ),
      h('div',{style:{height:'8px',background:'#c8daea',borderRadius:'4px',overflow:'hidden'}},
        h('div',{style:{height:'100%',width:pct+'%',background:'linear-gradient(90deg,#2563eb,#60a5fa)',borderRadius:'4px',transition:'width .4s ease'}})
      ),
      firmPanel||h('span')
    );
    custChartDiv.appendChild(bar);
  });

  return h('div',{style:{animation:'fu .3s ease'}},
    h('div',{style:{marginBottom:'16px'}},
      h('h2',{style:{fontSize:window.innerWidth<=768?'15px':'18px',fontWeight:'800',color:'#1e2d4a'}},window.innerWidth<=768?'🌐 Pazarlama Dashboard':'🌐 Pazarlama / İş Geliştirme Dashboard')
    ),
    mktDateBox,
    kpiGrid,
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'16px'}},
      card('🏭 Sektör Bazlı Ciro Dağılımı (Bar) — Kazanılan İşler', (()=>{
        const wonMap = {};
        O.filter(o=>o.stage==='KAZANILDI').forEach(o=>{const s=o.sector||'Diğer';if(!wonMap[s])wonMap[s]={val:0,cnt:0};wonMap[s].val+=Number(o.value)||0;wonMap[s].cnt++;});
        const wonItems = Object.entries(wonMap).sort((a,b)=>b[1].val-a[1].val).map(([s,d])=>({sector:s,...d}));
        const maxW = Math.max(1,...wonItems.map(x=>x.val));
        return wonItems.length ? barChart(wonItems, maxW, (x,i)=>SECT_COLORS[wonItems.indexOf(x)%SECT_COLORS.length], x=>x.sector, x=>x.val, x=>x.cnt+'x') : h('div',{style:{color:T3,textAlign:'center',padding:'20px',fontSize:'13px'}},'Henüz kazanılan iş yok.');
      })()),
      card('🥧 Sektör Bazlı Dağılım (Pasta) — Kazanılan İşler', (()=>{
        const wonMap2 = {};
        O.filter(o=>o.stage==='KAZANILDI').forEach(o=>{const s=o.sector||'Diğer';if(!wonMap2[s])wonMap2[s]=0;wonMap2[s]+=Number(o.value)||0;});
        const segs = Object.entries(wonMap2).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([s,v],i)=>({label:s,value:v,color:SECT_COLORS[i%SECT_COLORS.length]}));
        return segs.length ? pieChart(segs) : h('div',{style:{color:T3,textAlign:'center',padding:'20px',fontSize:'13px'}},'Henüz kazanılan iş yok.');
      })())
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'16px'}},
      card('📉 Kayıp Fırsat Analizi', lostPie),
      card('🏢 Sektör Bazlı Tüm Pipeline Dağılımı', sectorPie)
    ),
    h('div',{},
      card('📅 Aylık Yeni Müşteri Kazanımı (Son 6 Ay)', custChartDiv)
    )
  );
}

// ═══════════════════════════════════════════════════════
// DASHBOARD — ANA FONKSİYON (3 TAB)
// ═══════════════════════════════════════════════════════
function renderDashboard() {
  const cu = state.currentUser;
  if(!state.dashTab) state.dashTab = cu?.isAdmin ? 'admin' : 'sales';
  const tabs = [
    {id:'admin', l:'🏢 Yönetici', admin:true},
    {id:'sales', l:'📈 Satış / Proje', admin:false},
    {id:'marketing', l:'🌐 Pazarlama / İş Geliştirme', admin:false},
  ];
  const isMobDash = window.innerWidth <= 768;
  const tabBar = h('div',{style:{display:'flex',gap:'6px',marginBottom:'16px',flexWrap:'wrap'}});
  tabs.forEach(t=>{
    if(t.admin && !cu?.isAdmin) return;
    const active = state.dashTab===t.id;
    const label = isMobDash && t.id==='marketing' ? '🌐 Pazarlama' : t.l;
    const b = btn(label, ()=>{ state.dashTab=t.id; render(); },
      active?'#1e2d4a':'#ffffff',
      active?'#ffffff':'#4a6080',
      isMobDash?'9px 12px':'10px 18px',
      {fontSize:isMobDash?'12px':'13px',fontWeight:active?'700':'500',border:active?'none':'1px solid #b0c8e0',borderRadius:'10px',boxShadow:active?'0 2px 8px rgba(30,45,74,.2)':'none',flex:isMobDash?'1':'none',textAlign:'center'}
    );
    tabBar.appendChild(b);
  });
  let content;
  if(state.dashTab==='admin') content = cu?.isAdmin ? renderDashboardAdmin() : renderDashboardSales();
  else if(state.dashTab==='sales') content = renderDashboardSales();
  else content = renderDashboardMarketing();
  return h('div',{style:{animation:'fu .3s ease'}},tabBar,content);
}

function buildSupplierModal(existing=null) {
  const isEdit = !!existing;
  const f = existing ? {...existing} : {
    id:'', name:'', type:'', city:'', phone:'', email:'', web:'', contacts:[], notes:''
  };
  if(!f.contacts) f.contacts = [];

  const container = h('div',{});

  function rerender() {
    container.innerHTML = '';

    // Firma adı
    container.appendChild(h('div',{style:{marginBottom:'14px'}},

        setState({suppliers:state.suppliers.filter(s=>s.id!==f.id),modal:null});
        showToast('Tedarikçi silindi','#dc2626');

    ));
  }

  rerender();
  return modal('🏭 '+(isEdit?'Tedarikçi Düzenle':'Yeni Tedarikçi'), container, ()=>setState({modal:null}), '640px');
}

function renderSuppliers() {
  const f = state.filters;
  const filtered = (state.suppliers||[]).filter(s=>{
    if(f.supQ){const _q=f.supQ.toLowerCase();if(!(s.firmName||'').toLowerCase().includes(_q)&&!(s.contacts||[]).some(ct=>(ct.name||'').toLowerCase().includes(_q)))return false;}
    if(f.supName && !(s.firmName||'').toLowerCase().includes(f.supName.toLowerCase())) return false;
    if(f.supType && s.supplierType !== f.supType) return false;
    return true;
  }).sort((a,b)=>(a.firmName||'').localeCompare(b.firmName||'','tr'));

  const filterRow = h('div',{style:{display:'flex',gap:'10px',marginBottom:'16px',flexWrap:'wrap',background:G2,padding:'12px 14px',borderRadius:'12px',border:`1px solid ${G3}`}},
    makeSearchInput(f.supQ||'',function(v){setState({filters:{...f,supQ:v}});}),
    (()=>{
      const s=h('select',{style:{flex:'1',minWidth:'160px',padding:'8px 12px',background:'#fff',border:`1px solid ${G4}`,borderRadius:'8px',fontSize:'13px',color:T1,outline:'none',cursor:'pointer'}});
      const sorted=[...(state.suppliers||[])].sort((a,b)=>(a.firmName||'').localeCompare(b.firmName||'','tr'));
      [{v:'',l:'🔍 Tüm Firmalar'},...sorted.map(su=>({v:su.firmName,l:su.firmName}))].forEach(opt=>{
        const o=document.createElement('option');o.value=opt.v;o.textContent=opt.l;
        if(f.supName===opt.v)o.selected=true;s.appendChild(o);
      });
      s.onchange=e=>setState({filters:{...f,supName:e.target.value}});
      return s;
    })(),
    (()=>{
      const s=h('select',{style:{padding:'8px 12px',background:'#fff',border:`1px solid ${G4}`,borderRadius:'8px',fontSize:'13px',color:T1,outline:'none',minWidth:'200px'}});
      ['',...SUPPLIER_TYPES].forEach(opt=>{const o=document.createElement('option');o.value=opt;o.textContent=opt||'Tüm Türler';if(f.supType===opt)o.selected=true;s.appendChild(o);});
      s.onchange=e=>setState({filters:{...f,supType:e.target.value}});
      return s;
    })(),
    (f.supName||f.supType||f.supQ)?btn('✕ Temizle',()=>setState({filters:{...f,supName:'',supType:'',supQ:''}}),'#fef2f2','#dc2626','8px 12px',{fontSize:'12px',borderRadius:'8px',border:'1px solid #fecaca'}):h('span')
  );

  const list = h('div',{style:{display:'flex',flexDirection:'column',gap:'11px'}});
  if(!filtered.length) list.appendChild(h('div',{style:{padding:'44px',textAlign:'center',color:T4,background:G2,borderRadius:'12px',border:`1px solid ${G3}`}},(state.suppliers||[]).length?'Filtre sonucu bulunamadı.':'Henüz tedarikçi kaydı yok.'));

  filtered.forEach(s=>{
    const contGrid=h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(250px,1fr))',gap:'8px'}});
    (s.contacts||[]).forEach(ct=>{
      contGrid.appendChild(h('div',{style:{background:'#edf5fc',border:'1px solid #b0c8e0',borderRadius:'9px',padding:'10px 14px'}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:'8px'}},
          h('div',{style:{flex:'1'}},
            h('div',{style:{fontWeight:'600',fontSize:'13px',color:T2,marginBottom:'4px'}},ct.name+(ct.title?' — '+ct.title:'')),
            h('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}},
              ct.email?h('span',{style:{fontSize:'11px',color:'#2563eb'}},'✉ '+ct.email):h('span'),
              ct.phone?h('a',{href:'https://wa.me/90'+ct.phone.replace(/[^0-9]/g,'').replace(/^0/,''),target:'_blank',style:{fontSize:'11px',color:'#15803d',textDecoration:'none',fontWeight:'600'}},'💬 '+ct.phone):h('span')
            )
          ),
          btn('✏️',()=>setState({modal:{type:'customer',item:c}}),'#eff6ff','#1d4ed8','4px 8px',{fontSize:'11px',border:'1px solid #bfdbfe',borderRadius:'6px',title:'Düzenle'})
        )
      ));
    });
    const card=h('div',{style:{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:'14px',boxShadow:'0 2px 8px rgba(20,80,40,.10)',padding:'16px 18px'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'12px'}},
        h('div',{},
          h('div',{style:{fontWeight:'800',fontSize:'17px',marginBottom:'8px',color:'#0f1f35'}},s.firmName),
          h('div',{style:{display:'flex',gap:'7px',flexWrap:'wrap',marginBottom:'6px'}},
            badge(s.supplierType,'#16a34a'),
            s.city?tag('📍 '+s.city):h('span'),
            tag('👤 '+(s.contacts||[]).length+' kişi')
          ),
          h('div',{style:{display:'flex',gap:'16px',flexWrap:'wrap'}},
            s.phone?h('span',{style:{fontSize:'12px',color:'#16a34a'}},'📞 '+s.phone):h('span'),
            s.email?h('span',{style:{fontSize:'12px',color:'#2563eb'}},'✉ '+s.email):h('span'),
            s.web?h('a',{href:s.web.startsWith('http')?s.web:'https://'+s.web,target:'_blank',style:{fontSize:'12px',color:'#7c3aed',textDecoration:'none',fontWeight:'500'}},'🌐 '+s.web):h('span')
          )
        ),
        h('div',{style:{display:'flex',gap:'7px',flexShrink:'0'}},
          btn('Düzenle',()=>setState({modal:{type:'supplier',item:s}}),'#f0fdf4','#15803d','7px 13px',{fontSize:'13px',border:'1px solid #86efac',borderRadius:'7px'}),

          btn('Sil',()=>{if(confirm('Tedarikçiyi silmek istediğinizden emin misiniz?')){deleteDoc('suppliers',s.id).then(()=>setState({suppliers:state.suppliers.filter(x=>x.id!==s.id)}));}},'#fef2f2','#dc2626','7px 13px',{fontSize:'13px',border:'1px solid #fecaca',borderRadius:'7px'})
        ),
      ),
      (s.contacts||[]).length?contGrid:h('div',{style:{color:T4,fontSize:'12px',fontStyle:'italic',marginTop:'8px'}},'Henüz kişi eklenmedi.')
    );
    list.appendChild(card);
  });

  return h('div',{style:{animation:'fu .3s ease'}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}},
      h('h2',{style:{fontSize:'20px',fontWeight:'800',color:'#0f1f35'}},'🏭 Tedarikçiler ',h('span',{style:{fontSize:'13px',color:T3,fontWeight:'400'}},'('+filtered.length+'/'+(state.suppliers||[]).length+')')),
      btn('+ Yeni Tedarikçi',()=>setState({modal:{type:'supplier',item:null}}),'linear-gradient(135deg,#16a34a,#15803d)','#fff','10px 20px',{fontSize:'14px',borderRadius:'10px',boxShadow:'0 3px 8px rgba(22,163,74,.3)'})
    ),
    filterRow,
    list
  );
}

function buildSupplierModal(item) {
  const f = item ? JSON.parse(JSON.stringify(item)) : {firmName:'',supplierType:SUPPLIER_TYPES[0],city:'',phone:'',email:'',web:'',contacts:[],createdAt:today()};
  let addMode = false;
  let nc = {name:'',title:'',email:'',phone:''};

  function getEl() {
    const contactsDiv = h('div',{});
    let editSupContactId = null;
    let esc = {name:'',title:'',email:'',phone:''};

    function renderContacts() {
      contactsDiv.innerHTML='';
      f.contacts.forEach(ct=>{
        if(editSupContactId===ct.id) {
          const eName=inp('Ad Soyad',esc.name,v=>esc.name=v);
          const eTitle=inp('Ünvan',esc.title,v=>esc.title=v);
          const eEmail=inp('E-posta',esc.email,v=>esc.email=v);
          const ePhone=inp('Telefon',esc.phone,v=>esc.phone=v);
          contactsDiv.appendChild(h('div',{style:{background:'#f0fdf4',border:'1.5px solid #16a34a',borderRadius:'10px',padding:'12px',marginBottom:'8px'}},
            row(field('Ad Soyad *',eName,true),field('Ünvan',eTitle,true)),
            row(field('E-posta',eEmail,true),field('Cep Tel',ePhone,true)),
            h('div',{style:{display:'flex',gap:'8px',marginTop:'8px'}},
              btn('✓ Kaydet',()=>{
                if(!esc.name)return;
                f.contacts=f.contacts.map(k=>k.id===ct.id?{...k,...esc}:k);
                editSupContactId=null;renderContacts();
              },'linear-gradient(135deg,#10b981,#059669)','#fff','7px 14px',{flex:'1',fontSize:'12px'}),
              btn('İptal',()=>{editSupContactId=null;renderContacts();},'#21262d','#8b949e','7px 12px',{fontSize:'12px'})
            )
          ));
        } else {
          contactsDiv.appendChild(h('div',{style:{background:G,border:`1px solid ${G4}`,borderRadius:'9px',padding:'10px 13px',marginBottom:'8px',display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
            h('div',{style:{flex:'1'}},
              h('div',{style:{fontWeight:'700',fontSize:'13px',color:T1,marginBottom:'3px'}},ct.name+(ct.title?` — ${ct.title}`:'')),
              h('div',{style:{display:'flex',gap:'12px',flexWrap:'wrap'}},
                ct.email?h('span',{style:{fontSize:'11px',color:'#2563eb'}},'✉ '+ct.email):h('span'),
                ct.phone?h('a',{href:'https://wa.me/90'+ct.phone.replace(/[^0-9]/g,'').replace(/^0/,''),target:'_blank',style:{fontSize:'11px',color:'#15803d',textDecoration:'none',fontWeight:'600'}},'💬 '+ct.phone):h('span')
              )
            ),
            h('div',{style:{display:'flex',gap:'5px'}},
              btn('✏️',()=>{editSupContactId=ct.id;esc={name:ct.name||'',title:ct.title||'',email:ct.email||'',phone:ct.phone||''};renderContacts();},'#f0fdf4','#15803d','5px 9px',{fontSize:'11px',border:'1px solid #86efac',borderRadius:'6px'}),
              h('button',{onClick:()=>{f.contacts=f.contacts.filter(k=>k.id!==ct.id);renderContacts();},style:{background:'none',border:'none',color:'#f87171',cursor:'pointer',fontSize:'18px',padding:'2px 6px'}},'×')
            )
          ));
        }
      });

// Arama input + Bul butonu helper
function makeSearchInput(val, onChange) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;gap:6px;min-width:220px;flex:0 0 auto;margin-left:auto;order:999';
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.placeholder = 'Anahtar kelime ara…';
  inp.value = val || '';
  inp.style.cssText = 'flex:1;padding:8px 11px;background:#fff;border:1px solid '+G4+';border-radius:8px;font-size:13px;color:'+T1+';outline:none;font-family:inherit;min-width:150px';
  const b = document.createElement('button');
  b.textContent = 'Bul';
  b.style.cssText = 'padding:8px 15px;background:#f97316;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap';
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter') onChange(inp.value); });
  b.addEventListener('click', function(){ onChange(inp.value); });
  // Kutu boşaltılınca (metin silinince) filtre otomatik sıfırlanır — aksi halde
  // Bul/Enter beklediği için eski filtre görünmeye devam ediyordu.
  inp.addEventListener('input', function(){ if(inp.value === '') onChange(''); });
  wrap.appendChild(inp);
  wrap.appendChild(b);
  return wrap;
}

// YARDIMCI: KAYDIRMALI TABLO (tüm tablolarda ortak)
// ═══════════════════════════════════════════════════════
function makeScrollTable(thead, tbody, colWidths, isEmpty, emptyMsg) {
  if(!document.getElementById('apro-sc-style')){
    const s=document.createElement('style');s.id='apro-sc-style';
    s.textContent='.apro-no-sb{scrollbar-width:none;-ms-overflow-style:none}.apro-no-sb::-webkit-scrollbar{display:none}';
    document.head.appendChild(s);
  }
  const minW=colWidths.reduce((a,b)=>a+b,0)+'px';
  const outer=document.createElement('div');
  outer.style.cssText='background:#edf5fc;border:1px solid #b0c8e0;border-radius:14px;box-shadow:0 2px 8px rgba(20,40,80,.12);overflow:clip';

  // HEADER — taşma yok, JS ile kaydırılır
  const headWrap=document.createElement('div');
  headWrap.style.cssText='overflow:hidden';
  const hTbl=document.createElement('table');
  hTbl.style.cssText='border-collapse:collapse;min-width:'+minW;
  hTbl.appendChild(thead);
  headWrap.appendChild(hTbl);

  // KAYDIRMA SATIRI: [◀] [şerit] [▶]
  const stripRow=document.createElement('div');
  stripRow.style.cssText='display:flex;align-items:stretch;background:#0ea5e9;border-top:1px solid #38bdf8;border-bottom:1px solid #0284c7';
  const bSt='background:#0284c7;color:#fff;border:none;padding:0 16px;cursor:pointer;font-size:14px;flex-shrink:0;font-family:inherit';
  const btnL=document.createElement('button');
  btnL.textContent='◀';btnL.style.cssText=bSt+';border-right:1px solid #0369a1';
  btnL.onmouseenter=()=>{btnL.style.background='#0369a1';};
  btnL.onmouseleave=()=>{btnL.style.background='#0284c7';};
  const btnR=document.createElement('button');
  btnR.textContent='▶';btnR.style.cssText=bSt+';border-left:1px solid #0369a1';
  btnR.onmouseenter=()=>{btnR.style.background='#0369a1';};
  btnR.onmouseleave=()=>{btnR.style.background='#0284c7';};
  const strip=document.createElement('div');
  strip.style.cssText='overflow-x:auto;overflow-y:hidden;height:22px;flex:1;cursor:ew-resize;background:#0ea5e9';
  const stripInner=document.createElement('div');
  stripInner.style.cssText='min-width:'+minW+';height:1px';
  strip.appendChild(stripInner);
  stripRow.appendChild(btnL);stripRow.appendChild(strip);stripRow.appendChild(btnR);

  // BODY — native scrollbar gizli
  const bodyWrap=document.createElement('div');
  bodyWrap.style.cssText='overflow-x:auto';
  bodyWrap.className='apro-no-sb';
  const bTbl=document.createElement('table');
  bTbl.style.cssText='border-collapse:collapse;min-width:'+minW;
  bTbl.appendChild(tbody);
  bodyWrap.appendChild(bTbl);

  // Senkronizasyon (sonsuz döngü koruması)
  let _s=false;
  function syncAll(v){
    if(_s)return;_s=true;
    const pos=Math.max(0,v);
    headWrap.scrollLeft=pos;bodyWrap.scrollLeft=pos;strip.scrollLeft=pos;
    _s=false;
  }
  btnL.addEventListener('click',()=>syncAll(bodyWrap.scrollLeft-250));
  btnR.addEventListener('click',()=>syncAll(bodyWrap.scrollLeft+250));
  strip.addEventListener('scroll',()=>{if(!_s)syncAll(strip.scrollLeft);});
  bodyWrap.addEventListener('scroll',()=>{if(!_s)syncAll(bodyWrap.scrollLeft);});

  // Sticky tablo başlığı sarmalayıcısı
  const stickyHead=document.createElement('div');
  stickyHead.className='apro-sticky-head';
  stickyHead.style.cssText='position:sticky;top:0;z-index:10;overflow:hidden;border-radius:14px 14px 0 0';
  stickyHead.appendChild(headWrap);
  stickyHead.appendChild(stripRow);
  outer.appendChild(stickyHead);
  outer.appendChild(bodyWrap);
  if(isEmpty){const e=document.createElement('div');e.style.cssText='padding:38px;text-align:center;color:#8ba3b8';e.textContent=emptyMsg;outer.appendChild(e);}

  // Sütun genişliklerini render sonrası ölç ve senkronize et (double-rAF: layout hazır olsun)
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const hRow=hTbl.querySelector('tr');
    if(!hRow)return;
    const hCells=[...hRow.cells];
    const n=hCells.length;
    const colMaxW=colWidths.slice(0,n).map(w=>w||0);
    // Tüm satırları tara (sadece ilk değil)
    [...bTbl.querySelectorAll('tr')].forEach(row=>{
      [...row.cells].forEach((cell,i)=>{if(i<n)colMaxW[i]=Math.max(colMaxW[i],cell.offsetWidth);});
    });
    // Başlık hücrelerine uygula
    hCells.forEach((cell,i)=>{cell.style.width=colMaxW[i]+'px';cell.style.minWidth=colMaxW[i]+'px';});
    // Tüm gövde hücrelerine uygula
    [...bTbl.querySelectorAll('tr')].forEach(row=>{
      [...row.cells].forEach((cell,i)=>{if(i<n){cell.style.width=colMaxW[i]+'px';cell.style.minWidth=colMaxW[i]+'px';}});
    });
    const totalW=colMaxW.reduce((s,w)=>s+w,0);
    stripInner.style.minWidth=totalW+'px';
    hTbl.style.minWidth=totalW+'px';
    bTbl.style.minWidth=totalW+'px';
  }));

  return outer;
}

function buildVisitModal(item) {
  const f = item ? JSON.parse(JSON.stringify(item)) : {
    customerId:'', visitDate:today(), visitTime:'', assignedTo:'', projectInfo:'', notes:'', createdAt:today()
  };
  const custOpts = [{v:'',l:'Seçin…'},...[...state.customers].sort((a,b)=>(a.firmName||'').localeCompare(b.firmName||'','tr')).map(c=>({v:c.id,l:c.firmName}))];
  const repOpts  = [{v:'',l:'-- Seçin --'},...state.users.filter(u=>u.active!==false).map(u=>({v:u.displayName,l:u.displayName}))];
  const fNotes = h('textarea',{placeholder:'Görüşme notları...',style:{width:'100%',padding:'10px 13px',background:'#fff',border:`1.5px solid ${G4}`,borderRadius:'8px',color:T1,fontSize:'13px',minHeight:'90px',resize:'vertical',boxSizing:'border-box',fontFamily:"'DM Sans',sans-serif"}},f.notes||'');
  fNotes.addEventListener('input',e=>f.notes=e.target.value);
  const content = h('div',{},
    row(field('Firma *', sel(custOpts,f.customerId,v=>f.customerId=v), true),
        field('Satış Temsilcisi *', sel(repOpts,f.assignedTo,v=>f.assignedTo=v), true)),
    row(field('Ziyaret Tarihi *', inp('',f.visitDate,v=>f.visitDate=v,'date'), true),
        field('Saat *', inp('',f.visitTime||'',v=>f.visitTime=v,'time'), true)),
    field('Proje Bilgisi', inp('Proje adı / konusu...',f.projectInfo||'',v=>f.projectInfo=v)),
    field('Görüşme Notları', fNotes),
    h('div',{style:{display:'flex',gap:'10px'}},
      btn('Kaydet',()=>{
        if(!f.customerId){showToast('⚠ Firma seçiniz.','#d97706');return;}
        if(!f.visitDate){showToast('⚠ Tarih giriniz.','#d97706');return;}
        if(!f.visitTime){showToast('⚠ Saat giriniz.','#d97706');return;}
        saveVisit(f,!!item);
      },'linear-gradient(135deg,#2563eb,#1d4ed8)','#fff','11px 16px',{flex:'1',fontSize:'14px'}),
      btn('İptal',()=>setState({modal:null}),'#21262d','#8b949e','11px 20px',{fontSize:'14px'})
    )
  );
  return modal(item?'Ziyareti Düzenle':'Yeni Ziyaret', content, ()=>setState({modal:null}), '620px');
}

  // MODAL
  if(state.modal) {
    const {type,item} = state.modal;
    let m;
    if(type==='customer') m=buildCustomerModal(item);
    else if(type==='supplier') m=buildSupplierModal(item);
    else if(type==='opportunity') m=buildOppModal(item);
    else if(type==='serviceopp') m=buildServiceOppModal(item);
    else if(type==='proposal') m=buildPropModal(item);
    else if(type==='service') m=buildServModal(item);
    else if(type==='appointment') m=buildAppointmentModal(item);
    else if(type==='visit') m=buildVisitModal(item);
    else if(type==='maintenance') m=buildMaintModal(item);
    else if(type==='import') m=buildImportModal();
    else if(type==='backup') m=buildBackupModal();
    else if(type==='admin') m=buildAdminModal();
    else if(type==='supplier') m=buildSupplierModal(state.modal.data||null);
    else if(type==='targets') m=buildTargetsModal();
    else if(type==='proplist') m=buildPropListModal(state.modal.title, state.modal.items);
    else if(type==='reports') { buildReportsModal().then(function(el){if(el&&root)root.appendChild(el);}); }
    if(m) root.appendChild(m);
  }
}

// ═══════════════════════════════════════════════════════
// NEXTAURA SETUP WIZARD — 6 ADIM
// ═══════════════════════════════════════════════════════
async function showNextAuraSetup() {
  const root = document.getElementById('root');
  let step = 1;
  const TOTAL = 6;
  let cfg = {
    license: { code:'', product:'', tier:'', year:0, valid:false },
    companyName:'', sectorShort:'', sector:'',
    defaultAdmin: { name:'', email:'', password:'' },
    lang:'tr', currency:'EUR',
    firebase:{ apiKey:'',authDomain:'',projectId:'',storageBucket:'',messagingSenderId:'',appId:'' },
    emailjs:{ serviceId:'', templateId:'', publicKey:'' },
    geminiKey:'',
    teklifUrl:'', teklifApiKey:''
  };

  const TIER_LABELS = { START:'Başlangıç', PRO:'Profesyonel', ENT:'Kurumsal' };
  const PROD_LABELS = { CRM:'CRM', TEKLIF:'Teklif', SUITE:'Suite' };

  function inp(ph, val, cb, type) {
    const el = document.createElement('input');
    el.type=type||'text'; el.placeholder=ph; el.value=val||'';
    el.style.cssText='width:100%;padding:11px 13px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:Inter,sans-serif;outline:none;box-sizing:border-box;transition:border-color .2s';
    el.addEventListener('focus',()=>el.style.borderColor='#6366f1');
    el.addEventListener('blur',()=>el.style.borderColor='#e2e8f0');
    el.addEventListener('input',()=>cb(el.value.trim()));
    return el;
  }
  function lbl(txt, req) {
    const el=document.createElement('div');
    el.style.cssText='font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;margin-top:14px';
    el.innerHTML=txt+(req?'<span style="color:#dc2626;margin-left:2px">*</span>':''); return el;
  }
  function hint(txt) {
    const el=document.createElement('div');
    el.style.cssText='font-size:11px;color:#6b7280;background:#f9fafb;border-radius:7px;padding:8px 10px;margin-top:8px;line-height:1.5';
    el.innerHTML=txt; return el;
  }
  function badge(txt, color) {
    const el=document.createElement('span');
    el.style.cssText=`display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:${color}20;color:${color};margin-left:8px`;
    el.textContent=txt; return el;
  }

  function renderStep() {
    root.innerHTML='';
    // Özellik kilitleri, sayfa açılışındaki donmuş TIER_FEATURES yerine
    // sihirbazda girilen lisanstan (cfg.license) türetilir — ilk kurulumda
    // PRO/ENT müşteri Gemini/çoklu döviz/teklif alanlarını görebilsin diye.
    const _wt = (cfg.license && cfg.license.tier) || '';
    const _wp = (cfg.license && cfg.license.product) || '';
    const wf = {
      ai_reports    : ['PRO','ENT','DEMO'].includes(_wt),
      quotation     : _wp === 'SUITE' || ['PRO','ENT','DEMO'].includes(_wt),
      multi_currency: ['PRO','ENT','DEMO'].includes(_wt),
    };
    const wrap=document.createElement('div');
    wrap.style.cssText='min-height:100vh;background:linear-gradient(160deg,#0f2040,#1e3a6e);display:flex;align-items:center;justify-content:center;font-family:Inter,sans-serif;padding:20px;';
    const card=document.createElement('div');
    card.style.cssText='background:#fff;border-radius:22px;padding:36px 32px;width:100%;max-width:500px;box-shadow:0 30px 80px rgba(15,31,53,.4);';

    // Header
    const hdr=document.createElement('div');
    hdr.style.cssText='text-align:center;margin-bottom:28px;';
    const STEP_ICONS=['🔑','🏢','👤','⚙️','🔌','🎉'];
    hdr.innerHTML=
      '<div style="width:58px;height:58px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 14px;box-shadow:0 4px 16px rgba(99,102,241,.4)">'+STEP_ICONS[step-1]+'</div>'+
      '<div style="font-size:20px;font-weight:800;color:#0f1f35;margin-bottom:4px">NextAura CRM Kurulumu</div>'+
      '<div style="font-size:12px;color:#6b7280">Adım '+step+' / '+TOTAL+'</div>'+
      '<div style="margin-top:12px;height:4px;background:#f1f5f9;border-radius:4px;overflow:hidden"><div style="height:100%;width:'+(step/TOTAL*100)+'%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:4px;transition:width .4s"></div></div>';
    card.appendChild(hdr);

    const body=document.createElement('div');

    // ── Adım 1: Lisans kodu ──
    if (step===1) {
      // ── Hızlı Kurulum: Aktivasyon Anahtarı (cihaz-bağımsız) ──
      const fast=document.createElement('div');
      fast.style.cssText='background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:12px;padding:16px;margin-bottom:18px';
      fast.innerHTML='<div style="font-size:14px;font-weight:700;color:#15803d;margin-bottom:4px">⚡ Hızlı Kurulum</div>'+
        '<div style="font-size:12px;color:#15803d;opacity:.85;margin-bottom:10px">Aktivasyon anahtarınızı girin; firma, Firebase ve giriş ayarlarının tümü otomatik yüklenir — elle kurulum gerekmez.</div>';
      const akInp=inp('nxak_...',cfg._activationKey||'',v=>cfg._activationKey=v);
      akInp.style.fontFamily='monospace,sans-serif';
      akInp.style.letterSpacing='.02em';
      fast.appendChild(akInp);
      const akErr=document.createElement('div');
      akErr.style.cssText='color:#dc2626;font-size:12px;margin-top:8px;min-height:16px';
      fast.appendChild(akErr);
      const akBtn=document.createElement('button');
      akBtn.textContent='Anahtar ile Otomatik Kur';
      akBtn.style.cssText='width:100%;margin-top:8px;padding:11px;background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer';
      akBtn.onclick=async()=>{
        const key=(cfg._activationKey||'').trim();
        akErr.textContent='';
        if (!key || key.length<16) { akErr.textContent='⚠️ Geçerli bir aktivasyon anahtarı girin.'; return; }
        akBtn.textContent='Yükleniyor...'; akBtn.disabled=true;
        try {
          const res=await fetch(`${NX_LICENSE_SERVER}/api/config/${encodeURIComponent(key)}`);
          if (!res.ok) {
            const j=await res.json().catch(()=>({}));
            akErr.textContent = res.status===403 ? '⛔ Lisans askıya alınmış. Destek ile görüşün.'
              : res.status===404 ? '❌ Anahtar bulunamadı. Lütfen kontrol edin.'
              : ('❌ '+(j.error||'Yükleme başarısız.'));
            akBtn.textContent='Anahtar ile Otomatik Kur'; akBtn.disabled=false; return;
          }
          const data=await res.json();
          const remote=data.config||{};
          // Sunucudan gelen config'i kaydet; lisansı geçerli işaretle.
          remote.license={ ...(remote.license||{}),
            code:data.license?.code, product:data.license?.product,
            tier:data.license?.tier, year:remote.license?.year||0, valid:true };
          remote.activationKey=key; // periyodik sync müşteriyi tek tek ayırt etsin
          if (!remote.syncServer) remote.syncServer=NX_LICENSE_SERVER;
          localStorage.setItem('nextaura_config', JSON.stringify(remote));
          window.location.reload();
        } catch {
          akErr.textContent='❌ Sunucuya ulaşılamadı. İnternet bağlantınızı kontrol edin.';
          akBtn.textContent='Anahtar ile Otomatik Kur'; akBtn.disabled=false;
        }
      };
      fast.appendChild(akBtn);
      body.appendChild(fast);

      body.appendChild(hint('📋 Aktivasyon anahtarınız satın alma/demo e-postanızda nxak_ ile başlayan kod olarak gönderilmiştir. Tüm ayarlar (firma, Firebase, giriş) otomatik yüklenir.'));
    }

    // ── Adım 2: Firma bilgileri ──
    if (step===2) {
      const lb=document.createElement('div');
      lb.style.cssText='display:flex;align-items:center;margin-bottom:4px';
      lb.innerHTML='<span style="font-size:15px;font-weight:700;color:#0f1f35">Firma Bilgileri</span>';
      if (cfg.license.tier) lb.appendChild(badge(TIER_LABELS[cfg.license.tier]||cfg.license.tier,'#6366f1'));
      if (cfg.license.product) lb.appendChild(badge(PROD_LABELS[cfg.license.product]||cfg.license.product,'#8b5cf6'));
      body.appendChild(lb);
      body.appendChild(lbl('Firma Adı',true));
      body.appendChild(inp('örn: ABC Mühendislik Ltd.',cfg.companyName,v=>cfg.companyName=v));
      body.appendChild(lbl('Kısa Sektör Tanımı (navbar\'da görünür)'));
      body.appendChild(inp('örn: Yangın & Güvenlik',cfg.sectorShort,v=>cfg.sectorShort=v));
      body.appendChild(lbl('Faaliyet Alanı / Sektör',true));
      const ta=document.createElement('textarea');
      ta.placeholder='örn: Yangın algılama, söndürme sistemleri, periyodik bakım hizmetleri...';
      ta.value=cfg.sector||''; ta.rows=3;
      ta.style.cssText='width:100%;padding:11px 13px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:13px;font-family:Inter,sans-serif;outline:none;box-sizing:border-box;resize:vertical;';
      ta.addEventListener('input',()=>cfg.sector=ta.value.trim());
      body.appendChild(ta);
      body.appendChild(hint('🤖 <b>Yapay zeka yönetici raporları için zorunludur.</b> Girdiğiniz sektör bilgisi, raporun firmanızın bulunduğu pazarı araştırması ve size özel stratejik analiz sunması için kullanılır. Ne kadar açıklayıcı yazarsanız rapor o kadar isabetli olur.'));
    }

    // ── Adım 3: Admin kullanıcı ──
    if (step===3) {
      body.appendChild(Object.assign(document.createElement('div'),{textContent:'İlk Yönetici Hesabı',style:{fontWeight:'700',fontSize:'15px',color:'#0f1f35',marginBottom:'4px'}}));
      body.appendChild(Object.assign(document.createElement('div'),{textContent:'Bu hesap sistemin ilk admin kullanıcısı olacak.',style:{fontSize:'13px',color:'#6b7280',marginBottom:'10px'}}));
      body.appendChild(lbl('Ad Soyad',true));
      body.appendChild(inp('örn: Ahmet Yılmaz',cfg.defaultAdmin.name,v=>cfg.defaultAdmin.name=v));
      body.appendChild(lbl('E-posta',true));
      body.appendChild(inp('admin@firma.com',cfg.defaultAdmin.email,v=>cfg.defaultAdmin.email=v,'email'));
      body.appendChild(lbl('Şifre',true));
      body.appendChild(inp('En az 6 karakter',cfg.defaultAdmin.password,v=>cfg.defaultAdmin.password=v,'password'));
      body.appendChild(hint('🔒 Firebase Console → Authentication → E-posta/Şifre girişini etkinleştirmeyi unutmayın.'));
    }

    // ── Adım 4: Sistem tercihleri ──
    if (step===4) {
      body.appendChild(Object.assign(document.createElement('div'),{textContent:'Sistem Tercihleri',style:{fontWeight:'700',fontSize:'15px',color:'#0f1f35',marginBottom:'4px'}}));
      body.appendChild(lbl('Para Birimi'));
      const curSel=document.createElement('select');
      curSel.style.cssText='width:100%;padding:11px 13px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:Inter,sans-serif;outline:none;box-sizing:border-box;background:#fff';
      [['EUR','Euro (€)'],['USD','Dolar ($)'],['TRY','Türk Lirası (₺)']].forEach(([v,l])=>{
        const o=document.createElement('option'); o.value=v; o.textContent=l;
        if(v===cfg.currency) o.selected=true;
        curSel.appendChild(o);
      });
      if (!wf.multi_currency) {
        curSel.disabled=true;
        body.appendChild(lbl('Para Birimi'));
        body.appendChild(curSel);
        body.appendChild(hint('🔒 Çoklu para birimi Profesyonel ve Kurumsal paketlerde kullanılabilir. Şu an EUR sabit.'));
      } else {
        curSel.addEventListener('change',()=>cfg.currency=curSel.value);
        body.appendChild(lbl('Para Birimi'));
        body.appendChild(curSel);
      }
      body.appendChild(lbl('Firebase Yapılandırması'));
      body.appendChild(inp('API Key: AIzaSy...',cfg.firebase.apiKey,v=>cfg.firebase.apiKey=v));
      body.appendChild(inp('Project ID: proje-id',cfg.firebase.projectId,v=>{cfg.firebase.projectId=v;cfg.firebase.storageBucket=v+'.firebasestorage.app';cfg.firebase.authDomain=v+'.firebaseapp.com';}));
      body.appendChild(inp('App ID: 1:...:web:...',cfg.firebase.appId,v=>cfg.firebase.appId=v));
      body.appendChild(inp('Messaging Sender ID',cfg.firebase.messagingSenderId,v=>cfg.firebase.messagingSenderId=v));
      body.appendChild(hint('📋 Firebase Console → Proje Ayarları → Genel → Uygulamalar bölümünden kopyalayın.'));
    }

    // ── Adım 5: Entegrasyonlar ──
    if (step===5) {
      body.appendChild(Object.assign(document.createElement('div'),{textContent:'Entegrasyonlar (İsteğe Bağlı)',style:{fontWeight:'700',fontSize:'15px',color:'#0f1f35',marginBottom:'4px'}}));
      body.appendChild(lbl('EmailJS — Mail Bildirimleri'));
      body.appendChild(inp('Service ID: service_...',cfg.emailjs.serviceId,v=>cfg.emailjs.serviceId=v));
      body.appendChild(inp('Template ID: template_...',cfg.emailjs.templateId,v=>cfg.emailjs.templateId=v));
      body.appendChild(inp('Public Key',cfg.emailjs.publicKey,v=>cfg.emailjs.publicKey=v));
      if (wf.ai_reports) {
        body.appendChild(lbl('Gemini API — YZ Raporları'));
        body.appendChild(inp('AIza... / AQ...',cfg.geminiKey,v=>cfg.geminiKey=v));
        body.appendChild(hint('🤖 Gemini API Key: aistudio.google.com/apikey adresinden ücretsiz alabilirsiniz. Google arama destekli, gerçek sektör araştırması yapar.'));
      } else {
        body.appendChild(Object.assign(document.createElement('div'),{
          innerHTML:'<div style="background:#fef3c7;border:1px solid #fde68a;border-radius:9px;padding:12px 14px;margin-top:14px;font-size:13px;color:#92400e">🔒 <b>YZ Raporları</b> — Profesyonel ve Kurumsal paketlerde kullanılabilir.</div>'
        }));
      }
      if (wf.quotation) {
        body.appendChild(lbl('Teklif Programı Entegrasyonu'));
        body.appendChild(inp('Teklif App URL: https://...',cfg.teklifUrl,v=>cfg.teklifUrl=v));
        body.appendChild(inp('API Key',cfg.teklifApiKey,v=>cfg.teklifApiKey=v));
      }
    }

    // ── Adım 6: Hazır ──
    if (step===6) {
      const doneBox=document.createElement('div');
      doneBox.style.cssText='text-align:center;padding:10px 0';
      doneBox.innerHTML=
        '<div style="font-size:52px;margin-bottom:12px">🎉</div>'+
        '<div style="font-size:18px;font-weight:800;color:#0f1f35;margin-bottom:8px">Kurulum Tamamlandı!</div>'+
        '<div style="font-size:13px;color:#6b7280;margin-bottom:20px">'+cfg.companyName+' CRM sisteminiz kullanıma hazır.</div>'+
        '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;text-align:left">'+
          '<div style="font-size:12px;font-weight:700;color:#15803d;margin-bottom:8px">✅ Yapılandırma Özeti</div>'+
          '<div style="font-size:12px;color:#374151;line-height:1.8">'+
            '🏢 Firma: <b>'+cfg.companyName+'</b><br>'+
            '📦 Paket: <b>'+(TIER_LABELS[cfg.license.tier]||cfg.license.tier)+' '+(PROD_LABELS[cfg.license.product]||cfg.license.product)+'</b><br>'+
            '👤 Admin: <b>'+cfg.defaultAdmin.email+'</b><br>'+
            '💱 Para Birimi: <b>'+cfg.currency+'</b><br>'+
            '🤖 YZ Raporları: <b>'+(wf.ai_reports?'Aktif':'Pakete dahil değil')+'</b>'+
          '</div>'+
        '</div>';
      body.appendChild(doneBox);
    }

    // Hata alanı
    const errEl=document.createElement('div');
    errEl.id='nx-err';
    errEl.style.cssText='color:#dc2626;font-size:12px;margin-top:10px;min-height:18px;font-weight:500';
    body.appendChild(errEl);

    // Butonlar
    const btnRow=document.createElement('div');
    btnRow.style.cssText='display:flex;gap:10px;margin-top:22px;';
    if (step>1 && step<6) {
      const back=document.createElement('button');
      back.textContent='← Geri';
      back.style.cssText='flex:1;padding:12px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;color:#374151;';
      back.onclick=()=>{step--;renderStep();};
      btnRow.appendChild(back);
    }
    // Adım 1 yalnız aktivasyon anahtarı ile kurulur (manuel akış kaldırıldı) —
    // ileri/adım navigasyonu yalnız varsa eski adımlar için (step>1) gösterilir.
    if (step>1) {
    const next=document.createElement('button');
    next.textContent=step===6?'🚀 CRM\'i Başlat':'İleri →';
    next.style.cssText='flex:2;padding:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(99,102,241,.35)';
    next.onclick=async()=>{
      const err=document.getElementById('nx-err');
      err.textContent='';
      if (step===1) {
        if (!cfg.license.code) { err.textContent='⚠️ Lisans kodu zorunludur.'; return; }
        next.textContent='Doğrulanıyor...'; next.disabled=true;
        const result=await validateLicense(cfg.license.code);
        if (!result) { err.textContent='❌ Geçersiz lisans kodu. Lütfen kontrol ediniz.'; next.textContent='İleri →'; next.disabled=false; return; }
        // Sunucu yetkisi: gömülü NX_SECRET ile üretilmiş ama sunucuda kayıtlı
        // olmayan sahte kodlar burada reddedilir. Ağ hatasında (srv=null) izin verilir.
        const srv=await nxServerCheck(cfg.license.code);
        if (srv && ['not_found','invalid','suspended','expired'].includes(srv.status)) {
          err.textContent = srv.status==='suspended' ? '⛔ Lisans askıya alınmış. Destek ile görüşün.'
            : srv.status==='expired' ? '⛔ Lisans süresi dolmuş. Lütfen yenileyin.'
            : '❌ Lisans sunucuda kayıtlı değil veya iptal edilmiş.';
          next.textContent='İleri →'; next.disabled=false; return;
        }
        cfg.license={ code:cfg.license.code, product:result.product, tier:result.tier, year:result.year, valid:true };
        step++; renderStep(); return;
      }
      if (step===2) {
        if (!cfg.companyName) { err.textContent='⚠️ Firma adı zorunludur.'; return; }
        if (!cfg.sector) { err.textContent='⚠️ Faaliyet alanı / sektör zorunludur (YZ raporları bu bilgiyi kullanır).'; return; }
      }
      if (step===3) {
        if (!cfg.defaultAdmin.name) { err.textContent='⚠️ Ad Soyad zorunludur.'; return; }
        if (!cfg.defaultAdmin.email) { err.textContent='⚠️ E-posta zorunludur.'; return; }
        if (cfg.defaultAdmin.password.length<6) { err.textContent='⚠️ Şifre en az 6 karakter olmalıdır.'; return; }
      }
      if (step===4 && (!cfg.firebase.apiKey||!cfg.firebase.projectId||!cfg.firebase.appId)) {
        err.textContent='⚠️ Firebase API Key, Project ID ve App ID zorunludur.'; return;
      }
      if (step===6) {
        localStorage.setItem('nextaura_config', JSON.stringify(cfg));
        window.location.reload(); return;
      }
      step++; renderStep();
    };
    btnRow.appendChild(next);
    }
    body.appendChild(btnRow);

    card.appendChild(body);
    wrap.appendChild(card);
    root.appendChild(wrap);
  }

  renderStep();
}

function tierBlock(feature, label) {
  const LABELS = { ai_reports:'YZ Raporları (Pro+)', quotation:'Teklif Entegrasyonu (Pro+)', multi_currency:'Çoklu Para Birimi (Pro+)', unlimited_users:'Sınırsız Kullanıcı (Kurumsal)', custom_domain:'Özel Alan Adı (Kurumsal)' };
  showToast('🔒 '+( LABELS[feature]||label||feature)+' bu pakette kullanılamaz. Yükseltmek için iletişime geçin.','#6366f1');
}

// ═══════════════════════════════════════════════════════
// BAŞLATMA
// ═══════════════════════════════════════════════════════
(async function init() {
  // ── Demo / tek-tık kurulum: ?ak=AKTIVASYON_ANAHTARI ──
  // E-postadaki "Demo'yu Başlat" linki buraya düşer; config sunucudan çekilip
  // kaydedilir ve sayfa kurulumsuz olarak yeniden yüklenir.
  // ÖNEMLİ: SETUP_MODE'dan bağımsız çalışır — cihazda zaten bir kurulum (ör. başka
  // bir firma/demo) varsa bile aktivasyon anahtarı onu EZER. Aksi halde demo linki
  // önceki config nedeniyle yok sayılır ve yanlış marka/giriş ekranı açılır.
  {
    const ak = new URLSearchParams(location.search).get('ak');
    if (ak && ak.trim().length >= 8) {
      try {
        const res = await fetch(`${NX_LICENSE_SERVER}/api/config/${encodeURIComponent(ak.trim())}`);
        if (res.ok) {
          const data   = await res.json();
          const remote = data.config || {};
          remote.license = { ...(remote.license || {}),
            code: data.license?.code, product: data.license?.product,
            tier: data.license?.tier, year: remote.license?.year || 0, valid: true };
          remote.activationKey = ak.trim(); // periyodik sync müşteriyi tek tek ayırt etsin
          if (!remote.syncServer) remote.syncServer = NX_LICENSE_SERVER;
          if (remote.firebase?.apiKey) {
            localStorage.setItem('nextaura_config', JSON.stringify(remote));
            location.replace(location.pathname); // ?ak temizlenir, config'le yeniden yüklenir
            return;
          }
        }
      } catch { /* sessizce manuel kuruluma düş */ }
    }
  }

  if (NEXTAURA_SETUP_MODE) {
    showNextAuraSetup();
    return;
  }

  // Lisans banner — önce mevcut cache'e göre göster
  nxShowLicenseBanner();
  // Aylık sync (fire-and-forget)
  if (nxShouldSync()) {
    nxSyncLicense().then(() => nxShowLicenseBanner());
  }

  // Firebase bağlanamaz/yanlış config olursa Firestore .get() sonsuza kadar
  // retry yapar ve await asılı kalır → kullanıcı "Yükleniyor"da kilitlenir.
  // Zaman aşımı ile bunu yakalayıp hata + kurulum sıfırlama seçeneği sunarız.
  const _withTimeout = (p, ms) => Promise.race([
    p,
    new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms)),
  ]);
  try {
    state.users   = await _withTimeout(loadUsers(), 12000);
    state.targets = await _withTimeout(loadTargets(), 12000);
    state.geminiKey = NEXTAURA_CFG?.geminiKey || (await _withTimeout(loadApiKey(), 12000).catch(() => ''));
  } catch (e) {
    nxShowConnectionError();
    return;
  }
  state.loading = false;
  render();
  setTimeout(checkMonthlyReport, 3000);
  setTimeout(startNotificationTimer, 5000);
})();

// Global AudioContext - Mac'te her seferinde yeniden oluşturmak sorun çıkarabilir
if(!window._audioCtx) {
  try { window._audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}

function playBeep(type) {
  try {
    let ctx = window._audioCtx;
    if(!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      window._audioCtx = ctx;
    }
    // Mac Safari/Chrome'da suspended olabilir - resume et
    const play = () => {
      const patterns = {
        urgent:  [{f:880,d:0.15},{f:0,d:0.05},{f:880,d:0.15},{f:0,d:0.05},{f:1100,d:0.3}],
        warning: [{f:660,d:0.2},{f:0,d:0.1},{f:660,d:0.2}],
        info:    [{f:520,d:0.15},{f:0,d:0.08},{f:650,d:0.25}],
        win:     [{f:523,d:0.1},{f:659,d:0.1},{f:784,d:0.1},{f:1047,d:0.3}],
        lose:    [{f:400,d:0.2},{f:0,d:0.05},{f:300,d:0.3}]
      };
      let t = ctx.currentTime + 0.05;
      (patterns[type]||patterns.info).forEach(({f,d})=>{
        if(f>0){
          const o=ctx.createOscillator(); const g=ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.frequency.value=f; o.type='sine';
          g.gain.setValueAtTime(0.35,t); g.gain.exponentialRampToValueAtTime(0.001,t+d);
          o.start(t); o.stop(t+d);
        }
        t+=d;
      });
    };
    if(ctx.state === 'suspended') {
      ctx.resume().then(play).catch(e=>console.warn('Audio resume failed:',e));
    } else {
      play();
    }
  } catch(e){ console.warn('playBeep error:', e); }
}

function _toTR(d) {
  if(!d) return '';
  d = d.trim();
  // Zaten TR: dd.mm.yyyy
  if(/^\d{2}\.\d{2}\.\d{4}/.test(d)) return d;
  // ISO: yyyy-mm-dd → dd.mm.yyyy
  const p=d.split('-');
  if(p.length===3) return p[2]+'.'+p[1]+'.'+p[0];
  return d;
}

function _toISO(d) {
  if(!d) return null;
  d = d.trim();
  // Zaten ISO formatı: yyyy-mm-dd
  if(/^\d{4}-\d{2}-\d{2}/.test(d)) return d.substring(0,10);
  // Türkçe format: dd.mm.yyyy
  const p=d.split('.');
  if(p.length===3) return p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
  return d;
}

// Timezone-safe Date oluşturucu - new Date("yyyy-mm-dd") UTC sorununu önler
function _toDate(d) {
  const iso = _toISO(d);
  if(!iso) return null;
  const parts = iso.split('-');
  if(parts.length!==3) return null;
  // new Date(year, month-1, day) → LOCAL time, UTC offset yok
  return new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
}

// Gün farkı hesabı - timezone-safe
function _diffDaysDate(d) {
  const date = _toDate(d);
  if(!date) return 9999;
  const today = new Date(); today.setHours(0,0,0,0);
  date.setHours(0,0,0,0);
  return Math.round((date-today)/(1000*60*60*24));
}
function _todayISO() {
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function _tomorrowISO() {
  const d=new Date(); d.setDate(d.getDate()+1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function _nowMin() {
  const d=new Date(); return d.getHours()*60+d.getMinutes();
}
function _hm2min(t) {
  if(!t) return -1;
  const p=t.split(':'); return parseInt(p[0])*60+parseInt(p[1]);
}
function _diffDays(d) {
  return _diffDaysDate(d);
}
function _custName(id) {
  return (state.customers.find(x=>x.id===id)||{}).firmName||'';
}

      }

      const nxtISO=nxtD.getFullYear()+'-'+String(nxtD.getMonth()+1).padStart(2,'0')+'-'+String(nxtD.getDate()).padStart(2,'0');

  (state.opportunities||[]).forEach(o=>{

      showNotification('opp_lose_'+o.id,'❌ Fırsat Kaybedildi',o.title+' · '+cn+' ('+o.stage+')','lose','admin');

    if(o.dueDate && !LOST.includes(o.stage) && o.stage!=='KAZANILDI') {

    }
    // Randevu 1 gün önce 16:30
    if(s.appointmentDate) {
      const iso=_toISO(s.appointmentDate);
      if(iso===tmrw && now>=990 && now<=994) {
        showNotification('svc_appt_'+s.id,'🔧 Yarın Servis Randevusu',(s.jobName||'Servis')+' · '+cn+' · '+s.appointmentDate,'warning',s.preparedBy);
      }

    if(s.validUntil && _diffDays(_toISO(s.validUntil))===1 && now>=480 && now<=484) {
      showNotification('svc_dl_'+s.id,'⏰ Servis Dead Line Yarın',(s.jobName||'Servis')+' · '+cn,'warning',s.preparedBy);
    }
  });

  // ── PERİYODİK BAKIM ────────────────────────────────
  (state.maintenances||[]).forEach(m=>{
    if(!m.appointmentDate) return;
    const cn=_custName(m.customerId);
    const iso=_toISO(m.appointmentDate);

      showNotification('maint_over_'+m.id+'_'+today,'🚨 Bakım Tarihi Geçti!',(m.jobName||'Bakım')+' · '+cn+' · '+Math.abs(diff)+' gün geçti','urgent',m.preparedBy);
      showNotification('maint_over_adm_'+m.id+'_'+today,'🚨 Bakım Tarihi Geçti',(m.jobName||'Bakım')+' · '+cn,'urgent','admin');

function startNotificationTimer() {
  if(window._notifInterval) clearInterval(window._notifInterval);
  if('Notification' in window && Notification.permission==='default') {
    Notification.requestPermission();
  }
  checkAllNotifications();
  window._notifInterval = setInterval(checkAllNotifications, 60000);
  // Mail sistemi
  initEmailJS();
  if(window._mailInterval) clearInterval(window._mailInterval);
  window._mailInterval = setInterval(checkAllMails, 300000);
  setTimeout(checkAllMails, 8000);
  // Teklif programı referans senkronu (atanan teklif no → fırsat REF.)
  if(window._qrefInterval) clearInterval(window._qrefInterval);
  window._qrefInterval = setInterval(syncQuotationRefs, 300000);
  setTimeout(syncQuotationRefs, 10000);
}

// Teklif Programı'ndan teklif numarası/durumunu fırsatlara senkronlar (arka planda).
async function syncQuotationRefs() {
  try {
    if (typeof TEKLIF_APP_URL === 'undefined' || typeof TEKLIF_API_KEY === 'undefined' || !TEKLIF_APP_URL || !TEKLIF_API_KEY) return;
    // Hem fırsatlardan hem teklif taleplerinden benzersiz quotationId topla
    const ids = [...new Set([
      ...(state.opportunities || []).filter(o => o.quotationId).map(o => o.quotationId),
      ...(state.proposals || []).filter(p => p.quotationId).map(p => p.quotationId),
    ])];
    if (ids.length === 0) return;
    let updatedOpps = [...state.opportunities];
    let updatedProps = [...state.proposals];
    let changed = false, deletedCount = 0;
    for (const qid of ids) {
      const res = await fetch(
        `${TEKLIF_APP_URL}/api/v1/crm/quotation-status?id=${encodeURIComponent(qid)}`,
        { headers: { 'x-crm-key': TEKLIF_API_KEY } }
      ).catch(() => null);
      if (!res || !res.ok) continue; // geçici hata → dokunma
      const body = await res.json().catch(() => null);
      const d = body && body.data;
      if (!d) continue;

      // Teklif silinmiş → ilgili CRM kayıtlarını temizle (buton "Teklif Oluştur"a döner)
      if (d.exists !== true) {
        for (const o of updatedOpps.filter(x => x.quotationId === qid)) {
          const upd = { ...o, quotationId: '', quotationUrl: '', quotationStatus: '', value: 0, tenderRef: '', assignedTo: '', ...stamp() };
          await saveDoc('opportunities', o.id, upd);
          updatedOpps = updatedOpps.map(x => x.id === o.id ? upd : x);
          changed = true; deletedCount++;
        }
        for (const p of updatedProps.filter(x => x.quotationId === qid)) {
          const upd = { ...p, quotationId: '', quotationUrl: '', quotationStatus: '', ...stamp() };
          await saveDoc('proposals', p.id, upd);
          updatedProps = updatedProps.map(x => x.id === p.id ? upd : x);
          changed = true;
        }
        continue;
      }

      const ref   = d.number ?? d.reference ?? null;
      const total = d.grandTotal ? parseFloat(d.grandTotal) : null;
      // Fırsatlar: durum (hazırlandı/gönderildi) + REF + değer + temsilci
      for (const o of updatedOpps.filter(x => x.quotationId === qid)) {
        const patch = {};
        if (d.status != null && d.status !== o.quotationStatus) patch.quotationStatus = d.status;
        if (ref != null && ref !== o.tenderRef) patch.tenderRef = ref;
        if (total != null && total > 0 && total !== o.value) patch.value = total;
        if (d.salesRep && d.salesRep !== o.assignedTo) patch.assignedTo = d.salesRep;
        if (Object.keys(patch).length === 0) continue;
        const upd = { ...o, ...patch, ...stamp() };
        await saveDoc('opportunities', o.id, upd);
        updatedOpps = updatedOpps.map(x => x.id === o.id ? upd : x);
        changed = true;
      }
      // Teklif talepleri: durum senkronu (buton/rapor durumları taze kalsın)
      for (const p of updatedProps.filter(x => x.quotationId === qid)) {
        if (d.status == null || d.status === p.quotationStatus) continue;
        const pupd = { ...p, quotationStatus: d.status, ...stamp() };
        await saveDoc('proposals', p.id, pupd);
        updatedProps = updatedProps.map(x => x.id === p.id ? pupd : x);
        changed = true;
      }
    }
    if (changed) {
      const _scrollSave = [...document.querySelectorAll('.apro-no-sb')].map(el => el.scrollLeft);
      setState({ opportunities: updatedOpps, proposals: updatedProps });
      requestAnimationFrame(() => {
        [...document.querySelectorAll('.apro-no-sb')].forEach((el, i) => { if (_scrollSave[i]) el.scrollLeft = _scrollSave[i]; });
      });
      if (deletedCount > 0) showToast('⚠️ Teklif programında silinen ' + deletedCount + ' teklif tespit edildi, CRM kayıtları temizlendi.');
    }
  } catch {}
}
