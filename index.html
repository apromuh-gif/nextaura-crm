const EMAILJS_SERVICE  = 'service_xm7vpad';
const EMAILJS_TEMPLATE = 'template_tfhbxqv';
const EMAILJS_KEY      = 'aFlqv_CSdq9QliGtN';

if(!window._mailSentKeys) window._mailSentKeys = new Set();

function initEmailJS() {
  try {
    if(typeof emailjs !== 'undefined') {
      emailjs.init(EMAILJS_KEY);
      console.log('✅ EmailJS hazır');
    }
  } catch(e) { console.warn('EmailJS init:', e); }
}

// Kullanıcının mail adresini bul
function getUserEmail(nameOrRole) {
  if(!nameOrRole) return null;
  if(nameOrRole === 'admin') {
    const admin = state.users.find(u => u.isAdmin && u.active !== false);
    return admin?.email || null;
  }
  const user = state.users.find(u => u.displayName === nameOrRole && u.active !== false);
  return user?.email || null;
}

function sendMail(key, toEmail, subject, bodyHtml) {
  if(window._mailSentKeys.has(key)) return;
  if(!toEmail || !toEmail.includes('@')) return;
  if(typeof emailjs === 'undefined') { console.warn('EmailJS yüklenmedi'); return; }
  window._mailSentKeys.add(key);
  emailjs.send(EMAILJS_SERVICE, EMAILJS_TEMPLATE, {
    subject: subject,
    body: bodyHtml,
    to_email: toEmail,
  }).then(()=>{
    console.log('✅ Mail gönderildi:', subject, '→', toEmail);
  }).catch(e=>{
    console.warn('❌ Mail hatası:', e);
    window._mailSentKeys.delete(key); // Hata olursa tekrar denenebilsin
  });
}

// Okunabilir mail içeriği oluştur
function mailBody(icon, title, details) {
  return '<div style="padding:12px 0;border-bottom:2px solid #2563eb;margin-bottom:16px">'
    + '<span style="font-size:24px">' + icon + '</span>'
    + '<span style="font-size:18px;font-weight:800;color:#0f1f35;margin-left:10px">' + title + '</span>'
    + '</div>'
    + '<table style="width:100%;border-collapse:collapse">'
    + details.map(([k,v]) =>
        '<tr><td style="padding:8px 12px;background:#e8f0fb;font-weight:700;font-size:13px;color:#1e3a5f;width:40%;border-radius:6px 0 0 6px">' + k + '</td>'
        + '<td style="padding:8px 12px;font-size:13px;color:#374151;border-bottom:1px solid #e2e8f0">' + v + '</td></tr>'
      ).join('')
    + '</table>'
    + '<div style="margin-top:16px;padding:10px 14px;background:#fffbeb;border-left:4px solid #f59e0b;border-radius:0 8px 8px 0;font-size:12px;color:#92400e">'
    + '⏰ Bu bildirim '+COMPANY_FULL+' tarafından otomatik gönderilmiştir. Lütfen gerekli aksiyonu alınız.'
    + '</div>';
}

function checkAllMails() {
  const now   = _nowMin();
  const today = _todayISO();
  const tmrw  = _tomorrowISO();
  if(!state.currentUser) return;

  // ── 📅 RANDEVULAR - yarın 16:30 ──────────────────────────────
  if(now >= 990 && now <= 994) {
    (state.appointments||[]).forEach(a => {
      if(a.status==='İptal'||a.status==='Tamamlandı') return;
      const iso = _toISO(a.apptDate); if(!iso) return;
      if(iso !== tmrw) return;
      const cn = _custName(a.customerId);
      const mailKey = 'mail_appt_tmrw_' + a.id;
      const subject = '📅 Yarın Randevu: ' + cn;
      const body = mailBody('📅', 'Yarın Randevunuz Var', [
        ['Firma', cn],
        ['Tarih', _toTR(a.apptDate)],
        ['Saat', a.apptTime || '-'],
        ['Temsilci', a.assignedTo || '-'],
        ['Not', a.notes || '-'],
      ]);
      // İlgili temsilci
      const repEmail = getUserEmail(a.assignedTo);
      if(repEmail) sendMail(mailKey + '_rep', repEmail, subject, body);
    });
  }

  // ── 📝 ZİYARETLER - yarın 16:30 ────────────────────────────
  if(now >= 990 && now <= 994) {
    (state.visits||[]).forEach(v => {
      const iso = _toISO(v.visitDate); if(!iso) return;
      if(iso !== tmrw) return;
      const cn = _custName(v.customerId);
      const mailKey = 'mail_visit_tmrw_' + v.id;
      const subject = '📝 Yarın Ziyaret: ' + cn;
      const body = mailBody('📝', 'Yarın Ziyaretiniz Var', [
        ['Firma', cn],
        ['Tarih', _toTR(v.visitDate)],
        ['Saat', v.visitTime || '-'],
        ['Proje', v.projectInfo || '-'],
        ['Temsilci', v.assignedTo || '-'],
      ]);
      const repEmail = getUserEmail(v.assignedTo);
      if(repEmail) sendMail(mailKey, repEmail, subject, body);
    });
  }

  // ── 🎯 FIRSATLAR - Sipariş tarihi 1 gün önce ─────────────────
  const LOST = ['KAÇTI','NO GO','FIRSAT ÖLDÜ'];
  (state.opportunities||[]).forEach(o => {
    if(!o.dueDate || LOST.includes(o.stage) || o.stage==='KAZANILDI') return;
    const diff = _diffDays(_toISO(o.dueDate));
    if(diff === 1 && now >= 480 && now <= 484) {
      const cn = _custName(o.customerId);
      const mailKey = 'mail_opp_due1_' + o.id;
      const subject = '⏰ Sipariş Tarihi Yarın: ' + o.title;
      const body = mailBody('⏰', 'Ön Görülen Sipariş Tarihi Yarın!', [
        ['Fırsat', o.title || '-'],
        ['Firma', cn],
        ['Sipariş Tarihi', _toTR(o.dueDate)],
        ['Değer', 'EUR ' + Number(o.value||0).toLocaleString('tr-TR')],
        ['Temsilci', o.assignedTo || '-'],
      ]);
      const repEmail = getUserEmail(o.assignedTo);
      if(repEmail) sendMail(mailKey, repEmail, subject, body);
    }
  });

  // ── 🔧 TEKNİK SERVİS - randevu 2 gün önce 16:30 ─────────────
  if(now >= 990 && now <= 994) {
    (state.services||[]).forEach(s => {
      if(!s.appointmentDate) return;
      const diff = _diffDays(_toISO(s.appointmentDate));
      if(diff === 2) {
        const cn = _custName(s.customerId);
        const mailKey = 'mail_svc_appt2_' + s.id;
        const subject = '🔧 Servis Randevusu 2 Gün Sonra: ' + (s.jobName||'Servis');
        const body = mailBody('🔧', 'Servis Randevusu 2 Gün Sonra', [
          ['İşin Adı', s.jobName || '-'],
          ['Firma', cn],
          ['Randevu Tarihi', _toTR(s.appointmentDate)],
          ['İlgili', s.preparedBy || '-'],
        ]);
        const repEmail = getUserEmail(s.preparedBy);
        if(repEmail) sendMail(mailKey, repEmail, subject, body);
      }
    });
  }

  // ── ⚙️ PERİYODİK BAKIM - 7 gün önce ─────────────────────────
  (state.maintenances||[]).forEach(m => {
    if(!m.appointmentDate) return;
    const diff = _diffDays(_toISO(m.appointmentDate));
    if(diff === 7 && now >= 540 && now <= 544) {
      const cn = _custName(m.customerId);
      const mailKey = 'mail_maint_7d_' + m.id;
      const subject = '⚙️ Bakım 7 Gün Sonra: ' + (m.jobName||'Bakım');
      const body = mailBody('⚙️', 'Periyodik Bakım 7 Gün Sonra', [
        ['İşin Adı', m.jobName || '-'],
        ['Firma', cn],
        ['Bakım Tarihi', _toTR(m.appointmentDate)],
        ['İlgili', m.preparedBy || '-'],
      ]);
      const repEmail = getUserEmail(m.preparedBy);
      if(repEmail) sendMail(mailKey, repEmail, subject, body);
    }
  });
}

// Tedarikçi CRUD
async function saveSupplier(form, isEdit) {
  setState({saving:true});
  const id = isEdit ? form.id : genId();
  const data = {...form, id, ...stamp(), createdAt: form.createdAt||today()};
  await saveDoc('suppliers', id, data);
  const list = isEdit ? state.suppliers.map(s=>s.id===id?data:s) : [...state.suppliers, data];
  setState({suppliers:list, modal:null, saving:false});
  showToast('✅ Tedarikçi kaydedildi!');
}
