<script>
// ═══════════════════════════════════════════════════════
// NEXTAURA — MÜŞTERİ YAPILANDIRMA KATMANI
// localStorage "nextaura_config" anahtarında saklanır.
// İlk kurulumda setup sihirbazı bu değerleri doldurur.
// ═══════════════════════════════════════════════════════
const NEXTAURA_CFG = (() => {
  try { return JSON.parse(localStorage.getItem('nextaura_config') || 'null'); } catch { return null; }
})();

// Lisans doğrulama (offline kriptografik hash).
// DİKKAT: NX_SECRET istemciye gömülü olduğundan offline hash YALNIZCA format/yazım
// kontrolüdür, güvenlik katmanı DEĞİLDİR. Gerçek yetki sunucudadır (nxServerCheck +
// nxSyncLicense): sunucuda kayıtlı olmayan kodlar aktivasyonda ve sync'te reddedilir.
const NX_SECRET = 'NXA-2026-f8c3de3d1fea04cf9bf';
async function validateLicense(code) {
  if (!code) return null;
  const parts = code.toUpperCase().split('-');
  // Format: NEXTAURA-PRODUCT-TIER-YEAR-HASH8
  if (parts.length !== 5 || parts[0] !== 'NEXTAURA') return null;
  const [, product, tier, year, hash] = parts;
  if (!['CRM','SUITE'].includes(product)) return null;
  if (!['START','PRO','ENT','DEMO'].includes(tier)) return null;
  if (parseInt(year) < 2026) return null;
  const data = `${product}-${tier}-${year}-${NX_SECRET}`;
  const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(data));
  const hex  = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').toUpperCase();
  if (hex.substring(0,8) !== hash) return null;
  return { product, tier, year: parseInt(year) };
}

const NEXTAURA_SETUP_MODE = !NEXTAURA_CFG?.firebase?.apiKey || !NEXTAURA_CFG?.license?.valid;

// Lisans senkronizasyonu
const NX_SYNC_KEY       = 'nx_last_sync';
const NX_SYNC_STATUS_KEY = 'nx_sync_status';
const NX_SYNC_DAYS_KEY   = 'nx_days_left';
// Faz 5: cihaz-bağımsız kurulum. Aktivasyon anahtarı ile config bu merkezi
// lisans sunucusundan çekilir. Operatör kendi dağıtımına göre güncelleyebilir.
const NX_LICENSE_SERVER = 'https://nextaura-admin.vercel.app';
// Periyodik doğrulama sunucusu: config'de belirtilmemişse merkezi sunucuya düşer
// ki gömülü NX_SECRET ile üretilmiş sahte lisanslar sunucuda yakalanabilsin.
const NX_SYNC_SERVER    = NEXTAURA_CFG?.syncServer || NX_LICENSE_SERVER;
const NX_GRACE_DAYS     = 30;
const NX_SYNC_INTERVAL  = 30; // gün

// Sunucu taraflı lisans doğrulama (aktivasyon anında). Sunucuda kayıtlı olmayan
// veya iptal/askı/süresi dolmuş kodları tespit eder. Ağ hatasında null döner →
// aktivasyona izin verilir, periyodik sync sonradan yakalar.
async function nxServerCheck(code) {
  if (!code) return null;
  try {
    const res = await fetch(`${NX_LICENSE_SERVER}/api/sync/${encodeURIComponent(code)}`);
    if (!res.ok) return res.status === 404 ? { status: 'not_found' } : null;
    const data = await res.json();
    if (data.product && !['CRM','SUITE'].includes(data.product)) data.status = 'invalid';
    return data;
  } catch { return null; }
}

async function nxSyncLicense() {
  // Lisans kodu kademe başına paylaşıldığından, varsa benzersiz aktivasyon
  // anahtarı ile sync yap (sunucu doğru müşteriyi/bitiş tarihini döndürsün).
  const id = NEXTAURA_CFG?.activationKey || NEXTAURA_CFG?.license?.code;
  if (!id || !NX_SYNC_SERVER) return;
  try {
    const res  = await fetch(`${NX_SYNC_SERVER}/api/sync/${encodeURIComponent(id)}`);
    if (res.ok) {
      const data = await res.json();
      const validProduct = !data.product || ['CRM','SUITE'].includes(data.product);
      localStorage.setItem(NX_SYNC_KEY,        Date.now().toString());
      localStorage.setItem(NX_SYNC_STATUS_KEY, validProduct ? data.status : 'invalid');
      localStorage.setItem(NX_SYNC_DAYS_KEY,   String(data.daysLeft));
      return data;
    }
  } catch {
    // Network hatası — grace period hesapla
    const lastSync = parseInt(localStorage.getItem(NX_SYNC_KEY) || '0', 10);
    if (lastSync) {
      const daysSince = (Date.now() - lastSync) / 86400000;
      if (daysSince > NX_GRACE_DAYS) {
        localStorage.setItem(NX_SYNC_STATUS_KEY, 'grace_expired');
      }
    }
  }
}

function nxShouldSync() {
  const last = parseInt(localStorage.getItem(NX_SYNC_KEY) || '0', 10);
  if (!last) return true;
  return (Date.now() - last) / 86400000 >= NX_SYNC_INTERVAL;
}

function nxGetSyncStatus() {
  return localStorage.getItem(NX_SYNC_STATUS_KEY) || 'pending';
}

function nxGetDaysLeft() {
  const v = localStorage.getItem(NX_SYNC_DAYS_KEY);
  return v !== null ? parseInt(v, 10) : null;
}

function nxShowLicenseBanner() {
  const status   = nxGetSyncStatus();
  const daysLeft = nxGetDaysLeft();
  const existing = document.getElementById('nx-license-banner');
  if (existing) existing.remove();
  if (status === 'active' || status === 'pending') return;

  // not_found = sunucuda kayıt yok (silinmiş/iptal), invalid = ürün/kod uyuşmuyor.
  // İkisi de bloklanmalı; aksi halde iptal edilen lisans sessizce çalışmaya devam eder.
  const isBlocking = status === 'expired' || status === 'suspended' || status === 'grace_expired'
    || status === 'not_found' || status === 'invalid';
  const isGrace    = status === 'grace';
  const isWarning  = status === 'warning';
  if (!isBlocking && !isGrace && !isWarning) return;

  const bg  = isBlocking ? '#dc2626' : isGrace ? '#d97706' : '#92400e';
  const bg2 = isBlocking ? '#b91c1c' : isGrace ? '#b45309' : '#78350f';
  const msg = isBlocking
    ? (status === 'suspended' ? 'Bu hesap askıya alınmıştır. Destek: destek@nextaura.com'
      : (status === 'not_found' || status === 'invalid') ? 'Lisansınız geçersiz veya iptal edilmiş. Destek: destek@nextaura.com'
      : 'Lisansınızın süresi dolmuştur. Yenileme: destek@nextaura.com')
    : isGrace
    ? 'Lisans sunucusuna bağlanılamıyor. Bağlantınızı kontrol edin. Yakında erişim kısıtlanacak.'
    : `⚠️ Lisansınız ${daysLeft !== null ? daysLeft + ' gün içinde' : 'yakında'} sona eriyor. Yenileme: destek@nextaura.com`;

  const banner = document.createElement('div');
  banner.id = 'nx-license-banner';
  banner.style.cssText = `position:fixed;top:0;left:0;right:0;z-index:99999;background:${bg};color:#fff;text-align:center;padding:10px 16px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:10px;`;
  banner.innerHTML = `<span>${isBlocking ? '🔴' : '⚠️'} ${msg}</span>`
    + (isBlocking ? `<a href="mailto:destek@nextaura.com" style="color:#fff;border:1px solid rgba(255,255,255,0.6);border-radius:6px;padding:2px 10px;font-size:12px;text-decoration:none;background:${bg2}">Destek Al →</a>` : '');
  document.body.insertBefore(banner, document.body.firstChild);

  // Eğer bloklanmışsa uygulama içeriğini kaydır
  if (isBlocking) {
    document.body.style.paddingTop = '44px';
  }
}

    + '<div style="font-size:44px;margin-bottom:12px">🔌</div>'
    + '<div style="font-size:18px;font-weight:800;color:#0f1f35;margin-bottom:8px">Veritabanına Bağlanılamadı</div>'
    + '<div style="font-size:13px;color:#4a6080;line-height:1.6;margin-bottom:24px">İnternet bağlantınızı kontrol edin. Sorun sürerse kurulum bilgileri (Firebase) hatalı olabilir — kurulumu sıfırlayıp aktivasyon anahtarınızla yeniden bağlanabilirsiniz.</div>'
    + '<button id="nx-retry-btn" style="width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px">↻ Tekrar Dene</button>'
    + '<button id="nx-reset-btn" style="width:100%;padding:12px;border:1px solid #d0daea;border-radius:10px;background:#fff;color:#dc2626;font-size:13px;font-weight:600;cursor:pointer">⚙️ Kurulumu Sıfırla</button>'
    + '<div style="font-size:11px;color:#7a90aa;margin-top:16px">Destek: destek@nextaura.com</div>'
    + '</div></div>';
  const retry = document.getElementById('nx-retry-btn');
  const reset = document.getElementById('nx-reset-btn');

      localStorage.removeItem('nextaura_config');
      location.reload();
    }
  };
}

const TEKLIF_APP_URL  = (NEXTAURA_CFG?.teklifUrl || '').replace(/\/$/, '');
const TEKLIF_API_URL  = TEKLIF_APP_URL ? TEKLIF_APP_URL + '/api/v1/crm/open-quotation' : '';
const TEKLIF_SYNC_URL = TEKLIF_APP_URL ? TEKLIF_APP_URL + '/api/v1/crm/customers' : '';
const TEKLIF_API_KEY  = NEXTAURA_CFG?.teklifApiKey || '';
const TEKLIF_AUTH_URL = TEKLIF_APP_URL + '/api/v1/crm/auth';
const TEKLIF_USERS_URL      = TEKLIF_APP_URL + '/api/v1/crm/users';
const TEKLIF_STAFF_SYNC_URL = TEKLIF_APP_URL + '/api/v1/crm/staff-lists';
// TEKLIF_API_KEY config'den gelir (yukarıda tanımlı)

// CRM kullanıcısı için teklif programında oturum açar, session token döndürür.
async function getCrmSessionToken() {
  // state.currentUser her zaman güvenilir; firebase.auth().currentUser
  // zaman zaman auth restore gecikmesi nedeniyle null olabilir.
  const _attempt = async () => {
    const cu = state.currentUser || firebase.auth().currentUser;
    if (!cu?.email) return null;
    const res = await fetch(TEKLIF_AUTH_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-crm-key': TEKLIF_API_KEY },
      body: JSON.stringify({
        email:  cu.email,
        name:   cu.displayName || cu.email,
        crmUid: cu.uid,
      }),
    }).catch(() => null);
    if (!res?.ok) return null;
    const body = await res.json().catch(() => null);
    return body?.data?.token ?? null;
  };
  try {
    const t = await _attempt();
    if (t) return t;
    // İlk denemede başarısız → 600ms bekle, tekrar dene
    await new Promise(r => setTimeout(r, 600));
    return await _attempt();
  } catch { return null; }
}

// Mevcut teklifi SSO ile aç. Teklif silinmişse CRM'den otomatik temizler.
async function openQuotationWithSSO(quotationId) {
  // Personel listelerini her açılışta sync et (fire-and-forget) — yalnızca bu firmanın kendi kullanıcıları
  fetch(TEKLIF_STAFF_SYNC_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-crm-key': TEKLIF_API_KEY },
    body: JSON.stringify({
      salesReps: usersWithTargets().map(u=>u.displayName),
      preparedByNames: state.users.map(u=>u.displayName).sort((a,b)=>a.localeCompare(b,'tr')),
    }),
  }).catch(() => {});

  // 1. Teklif hala var mı kontrol et
  try {
    const chk = await fetch(
      `${TEKLIF_APP_URL}/api/v1/crm/quotation-status?id=${encodeURIComponent(quotationId)}`,
      { headers: { 'x-crm-key': TEKLIF_API_KEY } }
    ).catch(() => null);
    if (chk?.ok) {
      const chkBody = await chk.json().catch(() => null);
      if (chkBody?.data?.exists === false) {
        // Teklif silinmiş → CRM'deki tüm ilgili kayıtları temizle
        const relatedProps = state.proposals.filter(p => p.quotationId === quotationId);
        for (const p of relatedProps) {
          const upd = { ...p, quotationId: '', quotationUrl: '', quotationStatus: '', ...stamp() };
          await saveDoc('proposals', p.id, upd);
          setState({ proposals: state.proposals.map(x => x.id === p.id ? upd : x) });
        }
        const relatedOpps = state.opportunities.filter(o => o.quotationId === quotationId);
        for (const o of relatedOpps) {
          const upd = { ...o, quotationId: '', quotationUrl: '', quotationStatus: '', value: 0, tenderRef: '', assignedTo: '', ...stamp() };
          await saveDoc('opportunities', o.id, upd);
          setState({ opportunities: state.opportunities.map(x => x.id === o.id ? upd : x) });
        }
        showToast('⚠️ Bu teklif teklif programında silinmiş. CRM kaydı temizlendi, yeni teklif oluşturabilirsiniz.');
        return;
      } else if (chkBody?.data?.exists === true) {
        // Teklif mevcut → durum + toplam + referans + satış temsilcisi → Firestore (self-healing)
        const tpStatus    = chkBody.data.status    ?? null;
        const tpTotal     = chkBody.data.grandTotal ? parseFloat(chkBody.data.grandTotal) : null;
        const tpReference = chkBody.data.reference ?? null;
        const tpSalesRep  = chkBody.data.salesRep  ?? null;
        const relatedProps = state.proposals.filter(p => p.quotationId === quotationId);
        for (const p of relatedProps) {
          const upd = { ...p, ...(tpStatus !== null && { quotationStatus: tpStatus }), ...stamp() };
          await saveDoc('proposals', p.id, upd);
          setState({ proposals: state.proposals.map(x => x.id === p.id ? upd : x) });
        }
        const relatedOpps = state.opportunities.filter(o => o.quotationId === quotationId);
        for (const o of relatedOpps) {
          const upd = { ...o,
            ...(tpStatus   !== null && { quotationStatus: tpStatus }),
            ...(tpTotal    !== null && tpTotal > 0 && { value: tpTotal }),
            ...(tpReference !== null && { tenderRef: tpReference }),
            ...(tpSalesRep  !== null && tpSalesRep !== '' && { assignedTo: tpSalesRep }),
            ...stamp()
          };
          await saveDoc('opportunities', o.id, upd);
          setState({ opportunities: state.opportunities.map(x => x.id === o.id ? upd : x) });
        }
      }
    }
  } catch {}
  // 2. Teklif mevcut → SSO ile doğrudan aç
  const token = await getCrmSessionToken();
  if (!token) { showToast('⚠️ Oturum alınamadı, tekrar deneyin.'); return; }
  window.open(`${TEKLIF_APP_URL}/crm-login?token=${encodeURIComponent(token)}&redirect=/quotations/${quotationId}`, '_blank');
}

function syncCustomerToTeklif(customer) {
  if (!customer || !customer.id) return;
  fetch(TEKLIF_SYNC_URL, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', 'x-crm-key': TEKLIF_API_KEY },
    body: JSON.stringify({
      crmCustomerId: customer.id,
      name: customer.firmName || customer.name || '',
      phone: customer.phone || '',
      email: customer.email || '',
    }),
  }).catch(() => {}); // Sessizce geç — CRM akışını engelleme
}

// Aşama 1+2: Teklif oluştur — tür seçimi + mükerrer koruma + CRM'e quotationId kaydet
async function teklifOlustur(customer, opportunityTitle, opportunityId) {
  if (!TIER_FEATURES.quotation) { tierBlock('quotation'); return; }
  // Format + para birimi seçimi
  const selection = await selectTeklifFormat();
  if (!selection) return;
  const { format, currency, language } = selection;
  // Teknik Servis: UNIT_PRICE düzeni + isService bayrağı (numara teknik servis serisi).
  const isService = format === 'SERVICE';
  const apiFormat = isService ? 'UNIT_PRICE' : format;
  // Personel listelerini Teklif Programı'na sync et (fire-and-forget)
  const salesRepsSync  = usersWithTargets().map(u=>u.displayName);
  const preparedBySync = usersWithTargets().map(u=>u.displayName).sort((a,b)=>a.localeCompare(b,'tr'));
  fetch(TEKLIF_STAFF_SYNC_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-crm-key': TEKLIF_API_KEY },
    body: JSON.stringify({ salesReps: salesRepsSync, preparedByNames: preparedBySync }),
  }).catch(() => {});

  // Aşama 2: Fırsata bağlı teklif zaten varsa uyar
  if (opportunityId) {
    const existing = state.proposals.find(p =>
      p.customerId === customer.id && p.quotationId && p.opportunityId === opportunityId
    );
    if (existing) {
      const openExisting = confirm(
        'Bu fırsat için zaten bir teklif oluşturulmuş:\n"' + existing.title + '"\n\nMevcut teklifi açmak ister misiniz?\n\nTamam = Mevcut teklifi aç\nİptal = Yine de yeni oluştur'
      );
      if (openExisting) {
        await openQuotationWithSSO(existing.quotationId);
        return;
      }
    }
  }
  try {
    showNotification('teklif-aciliyor', 'Teklif Programı', 'Teklif oluşturuluyor...', 'info');
    const res = await fetch(TEKLIF_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-crm-key': TEKLIF_API_KEY },
      body: JSON.stringify({
        customerName: customer.firmName || customer.name || 'Bilinmeyen',
        phone: customer.phone || '',
        email: customer.email || '',
        crmCustomerId: customer.id || '',
        crmOpportunityTitle: opportunityTitle || '',
        format: apiFormat,
        currency: currency,
        language: language,
        isService: isService,
      }),
    });
    const body = await res.json().catch(() => null);
    if (!res.ok) throw new Error(body?.error?.message ?? 'Sunucu hatası');
    const { quotationId, quotationUrl } = body.data;
    // Fırsata bağlıysa: mevcut proposal'ı güncelle, yoksa yeni oluştur
    const existingProp = opportunityId
      ? state.proposals.find(p => p.opportunityId === opportunityId && !p.quotationId)
      : null;
    if (existingProp) {
      const updated = {...existingProp, quotationId: quotationId||'', quotationUrl: quotationUrl||'', quotationStatus: 'DRAFT', source: 'opportunity', ...stamp()};
      await saveDoc('proposals', existingProp.id, updated);
      setState({ proposals: state.proposals.map(p => p.id===existingProp.id ? updated : p) });
    } else {
      const propTitle = opportunityTitle || ((customer.firmName || customer.name || '') + ' — Teklif');
      const propId = genId();
      const propData = {
        id: propId, title: propTitle,
        customerId: customer.id||'', opportunityId: opportunityId||'',
        preparedBy: state.currentUser?.displayName||'', amount: 0,
        status: 'Hazırlanıyor', createdAt: today(),
        validUntil: '', sentDate: '', notes: '',
        quotationId: quotationId||'', quotationUrl: quotationUrl||'', quotationStatus: 'DRAFT',
        source: 'opportunity',
        ...stamp(),
      };
      await saveDoc('proposals', propId, propData);
      setState({ proposals: [...state.proposals, propData] });
    }
    // Fırsata doğrudan quotationUrl yaz (hızlı erişim için)
    if (opportunityId) {
      const opp = state.opportunities.find(o => o.id === opportunityId);
      if (opp) {
        const updatedOpp = {...opp, quotationId: quotationId||'', quotationUrl: quotationUrl||'', quotationStatus: 'DRAFT', ...stamp()};
        await saveDoc('opportunities', opportunityId, updatedOpp);
        setState({ opportunities: state.opportunities.map(o => o.id===opportunityId ? updatedOpp : o) });
      }
    }
    // Otomatik oturum: CRM kullanıcısı teklif programına direkt girer
    const sessionToken = await getCrmSessionToken();
    if (!sessionToken) {
      console.warn('[SSO] Token alınamadı — pencere açılmadı.');
      showToast('⚠️ Teklif oluşturuldu. Teklif Programı açılamadı, lütfen tekrar deneyin.');
      return;
    }
    // Yeni oluşturulan teklif direkt açılır (az önce DB'ye yazıldı, 404 yok)
    const openUrl = `${TEKLIF_APP_URL}/crm-login?token=${encodeURIComponent(sessionToken)}&redirect=/quotations/${quotationId}`;
    window.open(openUrl, '_blank');
    showToast('✅ Teklif oluşturuldu — Fırsat ve Teklif Talepleri güncellendi!');
  } catch(e) {
    alert('Teklif oluşturulamadı: ' + e.message);
  }
}

async function loadUsers() {
  try {
    const snap = await db.collection('users').get();
    if(snap.empty) {
      // İlk kurulum - rol dokümanlarını oluştur (şifre Firebase Auth'ta tutulur, dokümana YAZILMAZ)
      for(const u of DEFAULT_USERS) {
        const {password, ...rest} = u;
        await db.collection('users').doc(u.email).set({...rest, active:true, createdAt: today()});
      }
      return DEFAULT_USERS.map(u=>{ const {password, ...r}=u; return {...r,active:true}; });
    }
    return snap.docs.map(d=>({...d.data(), email:d.id}));
  } catch(e) { return DEFAULT_USERS.map(u=>{ const {password, ...r}=u; return {...r,active:true}; }); }
}

async function loadCollection(name) {
  try {
    const snap = await db.collection(name).orderBy('createdAt','asc').get();
    return snap.docs.map(d=>({...d.data(), id:d.id}));
  } catch(e) {
    try {
      const snap = await db.collection(name).get();
      return snap.docs.map(d=>({...d.data(), id:d.id}));
    } catch(e2) { return []; }
  }
}

async function saveTargets(targets) {

function h(tag, attrs={}, ...children) {
  const el = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)) {
    if(k==='style'&&typeof v==='object') Object.assign(el.style, v);
    else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if(k==='className') el.className=v;
    else el.setAttribute(k,v);
  }
  for(const c of children.flat()) {
    if(c==null||c===false||c===undefined) continue;
    el.appendChild(typeof c==='string'||typeof c==='number' ? document.createTextNode(String(c)) : c);
  }
  return el;
}
function badge(lbl, color) {
  return h('span',{style:{background:color+'22',color,padding:'4px 11px',borderRadius:'20px',fontSize:'12px',fontWeight:'700',whiteSpace:'nowrap',border:'1px solid '+color+'44'}},lbl);
}
function tag(lbl) {
  return h('span',{style:{background:'#d8e4f0',color:'#1e3a5f',padding:'4px 10px',borderRadius:'6px',fontSize:'12px',fontWeight:'500',whiteSpace:'nowrap',border:'1px solid #b8c8de'}},lbl);
}
function lbl(text) {
  return h('label',{style:{display:'block',fontSize:'12px',color:'#4a6080',marginBottom:'5px',fontWeight:'600',textTransform:'uppercase',letterSpacing:'.05em'}},text);
}
function btn(text, onClick, bg, fg='#fff', p='10px 18px', extra={}) {
  const el = h('button',{onClick,style:{background:bg,border:'none',borderRadius:'9px',padding:p,color:fg,fontWeight:'600',fontSize:'14px',cursor:'pointer',fontFamily:"'Inter',sans-serif",transition:'filter .15s',...extra}},text);
  el.addEventListener('mouseenter',()=>el.style.filter='brightness(1.1)');
  el.addEventListener('mouseleave',()=>el.style.filter='none');
  return el;
}
function inp(placeholder, value, onChange, type='text', extra={}) {
  const el = h('input',{type,placeholder,value:value||'',style:{width:'100%',padding:'10px 13px',background:'#edf5fc',border:'1.5px solid #90b0cc',borderRadius:'8px',color:'#0f1f35',fontSize:'14px',boxSizing:'border-box',fontFamily:"'Inter',sans-serif",...extra}});
  el.addEventListener('focus',()=>el.style.borderColor=ACC);
  el.addEventListener('blur',()=>el.style.borderColor='#b8c8de');
  el.addEventListener('input', e=>onChange(e.target.value));
  return el;
}
function sel(options, value, onChange, extra={}) {
  const el = h('select',{style:{width:'100%',padding:'10px 13px',background:'#edf5fc',border:'1.5px solid #90b0cc',borderRadius:'8px',color:'#0f1f35',fontSize:'14px',boxSizing:'border-box',fontFamily:"'Inter',sans-serif",...extra}});
  options.forEach(o=>{
    const opt = document.createElement('option');
    opt.value = o.v!==undefined?o.v:o;
    opt.textContent = o.l!==undefined?o.l:o;
    if(String(o.v!==undefined?o.v:o)===String(value)) opt.selected=true;
    el.appendChild(opt);
  });
  el.addEventListener('change', e=>onChange(e.target.value));
  return el;
}
function field(labelTxt, child, half=false) {
  const isMobField=window.innerWidth<=480;
return h('div',{style:{marginBottom:'13px',flex:(half&&!isMobField)?'1 1 45%':'1 1 100%',minWidth:(half&&!isMobField)?'150px':'0',width:'100%',boxSizing:'border-box'}},lbl(labelTxt),child);
}
function row(...children) {
  const _isMR=window.innerWidth<=480;
  return h('div',{style:{display:'flex',flexDirection:_isMR?'column':'row',gap:'12px',flexWrap:'wrap'}},...children);
}
function modal(title, content, onClose, maxWidth='640px') {
  const mob = window.innerWidth <= 768;
  const box = h('div',{style:{
    background:'#edf5fc',border:'1px solid #b0c8e0',
    borderRadius: mob ? '20px 20px 0 0' : '16px',
    padding: mob ? '20px 16px 32px' : '28px',
    width:'100%',
    maxWidth: mob ? '100%' : maxWidth,
    maxHeight: mob ? '88vh' : '92vh',
    overflowY:'auto',
    boxShadow:'0 20px 50px rgba(30,58,95,.2)',
    position: mob ? 'fixed' : 'relative',
    bottom: mob ? '0' : 'auto',
    left: mob ? '0' : 'auto',
    right: mob ? '0' : 'auto',
  }},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px',paddingBottom:'16px',borderBottom:'1px solid #d0daea'}},
      h('h3',{style:{margin:'0',color:'#0f1f35',fontSize: mob ? '17px' : '20px',fontWeight:'800'}},title),
      h('button',{onClick:onClose,style:{background:'#d0e4f4',border:'none',color:'#4a6080',cursor:'pointer',fontSize:'18px',width:'32px',height:'32px',borderRadius:'8px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:'0'}},'×')
    ),
    content
  );
  const bg = h('div',{style:{
    position:'fixed',inset:'0',
    background:'rgba(15,31,53,.5)',
    zIndex:'999',
    display:'flex',
    alignItems: mob ? 'flex-end' : 'center',
    justifyContent:'center',
    padding: mob ? '0' : '16px',
    backdropFilter:'blur(3px)'
  }},box);
  bg.addEventListener('click',e=>{if(e.target===bg)onClose();});
  return bg;
}

let loginState = {email:'',pw:'',err:'',attempts:0,locked:false};

function renderLogin() {
  async function doLogin() {
    if(loginState.locked) return;
    loginState.err = '';
    loginState.checking = true;
    renderLoginForm();
    const email = loginState.email.trim().toLowerCase();
    const pw = loginState.pw;
    const da = DEFAULT_USERS[0];
    const isDefaultAdmin = da && email === String(da.email).toLowerCase();
    try {
      // Firebase Auth ile gerçek kimlik doğrulama (şifre artık istemcide saklanmaz)
      try {
        await auth.signInWithEmailAndPassword(email, pw);
      } catch(e) {
        const code = e.code || '';
        const noUser = code==='auth/user-not-found' || code==='auth/invalid-credential' || code==='auth/invalid-login-credentials';
        // İlk kurulum: tanımlı admin ilk kez doğru şifreyle giriyorsa Auth hesabını oluştur
        if(noUser && isDefaultAdmin && pw === da.password) {
          await auth.createUserWithEmailAndPassword(email, pw);
        } else {
          throw e;
        }
      }
      // Kimlik doğrulandı → rol bilgisini users dokümanından oku
      let urec;
      const ref = db.collection('users').doc(email);
      const snap = await ref.get({source:'server'});
      if(snap.exists) {
        urec = {...snap.data(), email};
      } else if(isDefaultAdmin) {
        // İlk admin rol dokümanı yoksa oluştur (şifre yazılmaz)
        urec = { email, displayName: da.displayName || 'Yönetici', isAdmin:true, active:true, hasTarget:true, createdAt: today() };
        const {email:_e, ...rest} = urec;
        await ref.set(rest);
      } else {
        await auth.signOut();
        loginState.checking = false;
        loginState.err = 'Hesabınız tanımlı değil. Yöneticinize başvurun.';
        loginState.pw = '';
        renderLoginForm();
        return;
      }
      if(urec.active === false) {
        await auth.signOut();
        loginState.checking = false;
        loginState.err = 'Bu hesap pasif. Yöneticiye başvurun.';
        loginState.pw = '';
        renderLoginForm();
        return;
      }
      loginState.checking = false;
      setState({currentUser:urec, view:'app', loading:true});
      await loadAllData();
      setState({loading:false});
    } catch(e) {
      loginState.checking = false;
      const code = e.code || '';
      if(code==='auth/wrong-password' || code==='auth/invalid-credential' || code==='auth/invalid-login-credentials') loginState.err = 'E-posta veya şifre hatalı.';
      else if(code==='auth/user-not-found') loginState.err = 'E-posta tanınmıyor.';
      else if(code==='auth/user-disabled') loginState.err = 'Bu hesap devre dışı bırakılmış.';
      else if(code==='auth/too-many-requests') loginState.err = 'Çok fazla deneme. Bir süre sonra tekrar deneyin.';
      else if(code==='auth/network-request-failed') loginState.err = 'Sunucuya bağlanılamadı. İnternet bağlantınızı kontrol edin.';
      else loginState.err = 'Giriş başarısız. (' + (code || e.message) + ')';
      loginState.attempts++;
      loginState.pw = '';
      if(loginState.attempts>=5) loginState.locked = true;
      renderLoginForm();
    }
  }

  function renderLoginForm() {
    const root = document.getElementById('root');
    root.innerHTML='';

    const emailInp = inp('e-posta@a-pro.com.tr', loginState.email, v=>{loginState.email=v;loginState.err='';});
    const pwInp = inp('••••••', loginState.pw, v=>{loginState.pw=v;loginState.err='';}, 'password', {letterSpacing:'0.18em',textAlign:'center',fontSize:'16px'});
    pwInp.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

    const errDiv = loginState.err ? h('div',{style:{background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:'9px',padding:'10px 14px',color:'#dc2626',fontSize:'13px',marginBottom:'14px',textAlign:'center'}},loginState.err) : null;

    const content = loginState.locked
      ? h('div',{style:{background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:'12px',padding:'20px',textAlign:'center'}},
          h('div',{style:{fontSize:'28px',marginBottom:'8px'}},'🚫'),
          h('div',{style:{color:'#dc2626',fontWeight:'700',fontSize:'15px',marginBottom:'4px'}},'Erişim Engellendi'),
          h('div',{style:{color:'#ef4444',fontSize:'13px'}},'5 hatalı deneme. Sayfayı yenileyip tekrar deneyin.')
        )
      : h('div',{},
          field('E-posta', emailInp),
          field('Şifre', pwInp),
          errDiv||h('span'),
          btn(loginState.checking?'Doğrulanıyor...':'Giriş Yap', loginState.checking?()=>{}:doLogin, 'linear-gradient(135deg,#2563eb,#1d4ed8)', '#fff', '13px 16px', {width:'100%',fontSize:'15px',borderRadius:'10px',fontWeight:'700',boxShadow:'0 4px 12px rgba(37,99,235,.3)',opacity:loginState.checking?'0.7':'1',cursor:loginState.checking?'not-allowed':'pointer'}),
          h('div',{style:{textAlign:'center',marginTop:'16px',fontSize:'12px',color:'#7a90aa'}},'Yetkisiz erişim yasaktır.')
        );

    root.appendChild(
      h('div',{style:{minHeight:'100vh',background:'linear-gradient(160deg,#0f2040 0%,#1e3a6e 50%,#1a3060 100%)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Inter',sans-serif"}},
        h('div',{style:{background:'#ffffff',border:'none',borderRadius:'20px',padding:'44px 40px',width:'100%',maxWidth:'400px',animation:'fu .35s ease',boxShadow:'0 25px 60px rgba(15,31,53,.35)'}},
          h('div',{style:{textAlign:'center',marginBottom:'28px'}},
            h('div',{style:{width:'60px',height:'60px',background:'linear-gradient(135deg,#2563eb,#1d4ed8)',borderRadius:'16px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'28px',margin:'0 auto 16px',boxShadow:'0 6px 16px rgba(37,99,235,.35)'}},'⚡'),
            h('div',{style:{fontWeight:'800',fontSize:'22px',color:'#0f1f35',marginBottom:'6px'}},COMPANY_FULL),
            h('div',{style:{fontSize:'12px',color:'#4a6080',textTransform:'uppercase',letterSpacing:'0.08em'}},COMPANY_SECTOR_SHORT||'Satış & Servis Yönetimi')
          ),
          content
        )
      )
    );
    setTimeout(()=>emailInp.focus(),100);
  }

  renderLoginForm();
}

    loadCollection('proposals'), loadCollection('services'), loadCollection('maintenances'),

  setState({customers, opportunities, proposals, services, maintenances, suppliers, serviceOpps, visits, appointments});
}

async function saveProp(form, isEdit) {
  setState({saving:true});
  const id = isEdit ? form.id : genId();
  const data = {...form, id, ...stamp(), createdAt: form.createdAt||today()};

  // Hazırlayan değişti mi veya yeni kayıt mı? → Anlık sesli bildirim
  const cu = state.currentUser;
  const prevProp = isEdit ? state.proposals.find(p=>p.id===id) : null;
  const preparedBy = data.preparedBy;
  const prevPreparedBy = prevProp?.preparedBy;
  const isAssignedToOther = preparedBy && cu && preparedBy !== cu.displayName;
  const assigneeChanged = isEdit ? (preparedBy !== prevPreparedBy) : true;

  await saveDoc('proposals', id, data);
  const list = isEdit ? state.proposals.map(p=>p.id===id?data:p) : [...state.proposals, data];
  setState({proposals:list, modal:null, saving:false});
  showToast('✅ Teklif kaydedildi!');

  // Hazırlayan başka bir kullanıcıysa ve atama yeni/değiştiyse bildirim göster
  if(isAssignedToOther && assigneeChanged) {
    const notifKey = 'prop_assigned_'+id+'_'+preparedBy;
    showNotification(notifKey,
        '📄 Teklif Atandı',
        '"'+(data.title||'Teklif')+'" hazırlamanız için atandı.',
        'info',
        preparedBy
      );
  }
}

async function delItem(col, id) {
  if(col==='proposals') {
    const p = state.proposals.find(x=>x.id===id);
    if(p && p.quotationId) {
      showToast('⛔ Teklif Programı\'na bağlı teklif talepleri CRM\'den silinemez.');
      return;
    }
    if(!confirm('Bu teklif taslağını silmek istediğinizden emin misiniz?')) return;
  } else {
    if(!confirm('Silmek istiyor musunuz?')) return;
  }
  await deleteDoc(col, id);
  if(col==='customers') setState({customers:state.customers.filter(x=>x.id!==id)});
  else if(col==='opportunities') setState({opportunities:state.opportunities.filter(x=>x.id!==id)});
  else if(col==='proposals') setState({proposals:state.proposals.filter(x=>x.id!==id)});
  else if(col==='services') setState({services:state.services.filter(x=>x.id!==id)});
  else if(col==='maintenances') setState({maintenances:state.maintenances.filter(x=>x.id!==id)});
  showToast('🗑 Silindi.');
}

function buildCustomerModal(item) {
  const f = item ? JSON.parse(JSON.stringify(item)) : {firmName:'',sector:SEC_C[0],city:'',phone:'',email:'',web:'',contacts:[],createdAt:today()};
  let addMode = false;
  let nc = {name:'',title:'',email:'',phone:''};

  function getEl() {
    const contactsDiv = h('div',{});
    let editContactId = null;
    let ec = {name:'',title:'',email:'',phone:''};

    function renderContacts() {
      contactsDiv.innerHTML='';
      f.contacts.forEach(ct=>{
        // Düzenleme modu aktif mi bu kişi için?
        if(editContactId===ct.id) {
          const eName=inp('Ad Soyad',ec.name,v=>ec.name=v);
          const eTitle=inp('Ünvan',ec.title,v=>ec.title=v);
          const eEmail=inp('E-posta',ec.email,v=>ec.email=v);
          const ePhone=inp('Telefon',ec.phone,v=>ec.phone=v);
          contactsDiv.appendChild(h('div',{style:{background:'#eff6ff',border:'1.5px solid #3b82f6',borderRadius:'10px',padding:'12px',marginBottom:'8px'}},
            row(field('Ad Soyad *',eName,true),field('Ünvan',eTitle,true)),
            row(field('E-posta',eEmail,true),field('Cep Tel',ePhone,true)),
            h('div',{style:{display:'flex',gap:'8px',marginTop:'8px'}},
              btn('✓ Kaydet',()=>{
                if(!ec.name)return;
                f.contacts=f.contacts.map(k=>k.id===ct.id?{...k,...ec}:k);
                editContactId=null;renderContacts();
              },'linear-gradient(135deg,#10b981,#059669)','#fff','7px 14px',{flex:'1',fontSize:'12px'}),
              btn('İptal',()=>{editContactId=null;renderContacts();},'#21262d','#8b949e','7px 12px',{fontSize:'12px'})
            )
          ));
        } else {
          contactsDiv.appendChild(h('div',{style:{background:G,border:`1px solid ${G4}`,borderRadius:'9px',padding:'10px 13px',marginBottom:'8px',display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
            h('div',{},
              h('div',{style:{fontWeight:'700',fontSize:'13px',color:T1,marginBottom:'3px'}},ct.name+(ct.title?` — ${ct.title}`:'')),
              h('div',{style:{display:'flex',gap:'12px',flexWrap:'wrap'}},
                ct.email?h('span',{style:{fontSize:'11px',color:'#2563eb'}},'✉ '+ct.email):h('span'),
                ct.phone?h('span',{style:{fontSize:'11px',color:'#16a34a'}},'📱 '+ct.phone):h('span')
              )
            ),
            h('div',{style:{display:'flex',gap:'5px'}},
              btn('✏️',()=>{editContactId=ct.id;ec={name:ct.name||'',title:ct.title||'',email:ct.email||'',phone:ct.phone||''};renderContacts();},'#eff6ff','#1d4ed8','5px 9px',{fontSize:'11px',border:'1px solid #bfdbfe',borderRadius:'6px'}),
              h('button',{onClick:()=>{f.contacts=f.contacts.filter(k=>k.id!==ct.id);renderContacts();},style:{background:'none',border:'none',color:'#f87171',cursor:'pointer',fontSize:'18px',padding:'2px 6px'}},'×')
            )
          ));
        }
      });
      if(!f.contacts.length&&!addMode) contactsDiv.appendChild(h('div',{style:{color:T3,fontSize:'12px'}},'Henüz kişi eklenmedi.'));
    }
    renderContacts();

    const addArea = h('div',{});
    const addBtn2 = btn('+ Kişi Ekle', ()=>{addMode=true;renderAdd();}, 'linear-gradient(135deg,#6366f1,#8b5cf6)', '#fff', '5px 12px', {fontSize:'12px'});
    function renderAdd() {
      addArea.innerHTML='';
      if(!addMode){addArea.appendChild(addBtn2);return;}
      const nName=inp('Ad Soyad',nc.name,v=>nc.name=v);
      const nTitle=inp('Müdür…',nc.title,v=>nc.title=v);
      const nEmail=inp('kisi@firma.com',nc.email,v=>nc.email=v);
      const nPhone=inp('0532 000 00 00',nc.phone,v=>nc.phone=v);
      addArea.appendChild(h('div',{style:{background:G,border:'1px solid #6366f1',borderRadius:'10px',padding:'13px'}},
        row(field('Ad Soyad *',nName,true),field('Ünvan',nTitle,true)),
        row(field('E-posta',nEmail,true),field('Cep Tel',nPhone,true)),
        h('div',{style:{display:'flex',gap:'8px'}},
          btn('✓ Kişiyi Ekle',()=>{if(!nc.name)return;f.contacts.push({...nc,id:genId()});nc={name:'',title:'',email:'',phone:''};addMode=false;renderContacts();renderAdd();},'linear-gradient(135deg,#10b981,#059669)','#fff','8px 14px',{flex:'1'}),
          btn('İptal',()=>{addMode=false;renderAdd();},'#21262d','#8b949e')
        )
      ));
    }
    renderAdd();

    const fName=inp('Firma adı',f.firmName,v=>f.firmName=v);
    // Sektör seçimi - ÇOK SEKTÖRLÜ ŞİRKET seçilirse alt panel açılır
    // Yeni firma ise sectors boş başlasın, düzenleme ise mevcut sectors gelsin
    if(!f.sectors || !Array.isArray(f.sectors)) f.sectors = [];
    // Yeni kayıt ise sıfırla, düzenlemede koru
    const isNewRecord = !item;
    if(isNewRecord) f.sectors = [];

    const subSectorPanel = document.createElement('div');
    subSectorPanel.style.cssText = 'display:none;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:14px;margin-top:8px;';

    function renderSubSectors() {
      subSectorPanel.innerHTML = '';
      const title = document.createElement('div');
      title.style.cssText = 'font-size:12px;font-weight:700;color:#1d4ed8;margin-bottom:10px;';
      title.textContent = '🏢 Sektörleri seçin (birden fazla seçilebilir):';
      subSectorPanel.appendChild(title);

      const grid = document.createElement('div');
      grid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:6px;';

      const subList = SEC_C.filter(s => s !== 'ÇOK SEKTÖRLÜ ŞİRKET');
      subList.forEach(function(s) {
        const isChecked = f.sectors.indexOf(s) >= 0;

        const lbl = document.createElement('label');
        lbl.style.cssText = 'display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:8px;cursor:pointer;user-select:none;' +
          (isChecked ? 'background:#dbeafe;border:1.5px solid #3b82f6;' : 'background:#fff;border:1.5px solid #e2e8f0;');

        const chk = document.createElement('input');
        chk.type = 'checkbox';
        chk.checked = isChecked;
        chk.style.cssText = 'width:15px;height:15px;cursor:pointer;accent-color:#2563eb;flex-shrink:0;';
        chk.addEventListener('change', function() {
          if(chk.checked) {
            if(f.sectors.indexOf(s) < 0) f.sectors.push(s);
          } else {
            f.sectors = f.sectors.filter(function(x){ return x !== s; });
          }
          renderSubSectors();
        });

        const span = document.createElement('span');
        span.style.cssText = 'font-size:12px;' + (isChecked ? 'color:#1d4ed8;font-weight:600;' : 'color:#374151;font-weight:400;');
        span.textContent = s;

        lbl.appendChild(chk);
        lbl.appendChild(span);
        grid.appendChild(lbl);
      });

      subSectorPanel.appendChild(grid);

      if(f.sectors.length > 0) {
        const summary = document.createElement('div');
        summary.style.cssText = 'margin-top:10px;padding:8px 10px;background:#dbeafe;border-radius:7px;font-size:12px;color:#1e40af;font-weight:600;';
        summary.textContent = '✓ ' + f.sectors.length + ' sektör seçildi: ' + f.sectors.join(', ');
        subSectorPanel.appendChild(summary);
      } else {
        const hint = document.createElement('div');
        hint.style.cssText = 'margin-top:8px;font-size:11px;color:#6b7280;font-style:italic;';
        hint.textContent = 'Henüz sektör seçilmedi.';
        subSectorPanel.appendChild(hint);
      }
    }

    const fSectorSel = sel(SEC_C, f.sector || SEC_C[0], function(v) {
      f.sector = v;
      if(v === 'ÇOK SEKTÖRLÜ ŞİRKET') {
        subSectorPanel.style.display = 'block';
        renderSubSectors();
      } else {
        subSectorPanel.style.display = 'none';
        f.sectors = [];
      }
    });

    // Düzenleme modunda zaten ÇOK SEKTÖRLÜ ŞİRKET ise paneli aç
    if(f.sector === 'ÇOK SEKTÖRLÜ ŞİRKET') {
      subSectorPanel.style.display = 'block';
      renderSubSectors();
    }

    const fSector = h('div', {}, fSectorSel, subSectorPanel);
    const fCity=inp('İstanbul',f.city,v=>f.city=v);
    const fPhone=inp('0212 000 00 00',f.phone,v=>f.phone=v);
    const fEmail=inp('info@firma.com',f.email,v=>f.email=v);
    const fWeb=inp('www.firma.com',f.web,v=>f.web=v);

    return h('div',{},
      field('Firma Adı *',fName),
      row(field('Sektör',fSector,true),field('Şehir',fCity,true)),
      row(field('Firma Telefonu',fPhone,true),field('Firma E-posta',fEmail,true)),
      field('Web Adresi',fWeb),
      h('div',{style:{marginBottom:'12px'}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}},
          lbl(`İletişim Kişileri (${f.contacts.length})`),
          addArea
        ),
        contactsDiv
      ),
      h('div',{style:{display:'flex',gap:'10px'}},
        btn('Kaydet',()=>{if(f.firmName)saveFirm(f,!!item);},'linear-gradient(135deg,#6366f1,#8b5cf6)','#fff','11px 16px',{flex:'1',fontSize:'14px'}),
        btn('İptal',()=>setState({modal:null}),'#21262d','#8b949e','11px 20px',{fontSize:'14px'})
      )
    );
  }
  return modal(item?'Firmayı Düzenle':'Yeni Firma', getEl(), ()=>setState({modal:null}), '680px');
}

function buildPropModal(item) {
  const f = item ? JSON.parse(JSON.stringify(item)) : {title:'',customerId:'',contractorId:'',opportunityId:'',preparedBy:'',amount:'',status:'Hazırlanıyor',createdAt:today(),validUntil:'',sentDate:'',notes:''};

  // Hazırlayan listesi: hedef girilmiş kullanıcılar; mevcut kayıttaki isim listede yoksa yine de ekle
  const _targetedNames = usersWithTargets().map(u=>u.displayName);
  const allNames = [...new Set([..._targetedNames, ...(f.preparedBy ? [f.preparedBy] : [])])];

  // Hazırlayan - açılır + yeni kişi ekle
  const prepContainer = document.createElement('div');

  function renderPrepField() {
    prepContainer.innerHTML = '';
    const selEl = document.createElement('select');
    selEl.style.cssText = `width:100%;padding:9px 12px;background:${G};border:1px solid ${G4};border-radius:8px;color:${T1};font-size:13px;outline:none;`;
    // Seçenekler
    [{v:'',l:'Seçin…'}, ...[...allNames].sort((a,b)=>a.localeCompare(b,'tr')).map(n=>({v:n,l:n}))].forEach(opt=>{
      const o = document.createElement('option');
      o.value = opt.v; o.textContent = opt.l;
      if(opt.v === f.preparedBy || (opt.v==='' && !f.preparedBy && !showCustom)) o.selected = true;
      selEl.appendChild(o);
    });
    selEl.addEventListener('change', e=>{
      f.preparedBy=e.target.value; renderPrepField();
    });
    prepContainer.appendChild(selEl);

  }
  renderPrepField();

  const custOpts = [{v:'',l:'Seçin…'},...[...state.customers].sort((a,b)=>(a.firmName||'').localeCompare(b.firmName||'','tr')).map(c=>({v:c.id,l:c.firmName}))];
  const oppOpts = [{v:'',l:'Seçin…'},...state.opportunities.map(o=>({v:o.id,l:o.title}))];
  const fTitle=inp('Teklif/Fırsat adı',f.title,v=>f.title=v);
  const fCust=sel(custOpts,f.customerId,v=>f.customerId=v);
  const fOpp=sel(oppOpts,f.opportunityId,v=>f.opportunityId=v);
  // Mevcut Gönderildi teklifler için sentDate'i modal açılışında doldur
  if(f.status==='Gönderildi'&&!f.sentDate) f.sentDate=today();
  const fSentDate=inp('',f.sentDate||'',v=>f.sentDate=v,'date');
  const fSt=sel(PROP_ST,f.status,v=>{
    f.status=v;
    if(v==='Gönderildi'&&!f.sentDate){f.sentDate=today();fSentDate.value=today();}
    if(v!=='Gönderildi'&&f.sentDate===today()){f.sentDate='';fSentDate.value='';}
  });
  const fAmt=inp('0',f.amount,v=>f.amount=v,'number');
  const fCreated=inp('',f.createdAt,v=>f.createdAt=v,'date');
  const fValid=inp('',f.validUntil,v=>f.validUntil=v,'date');
  const fNotes=h('textarea',{placeholder:'Notlar...',style:{width:'100%',padding:'9px 12px',background:G,border:`1px solid ${G4}`,borderRadius:'8px',color:T1,fontSize:'13px',minHeight:'55px',resize:'vertical',boxSizing:'border-box',fontFamily:"'DM Sans',sans-serif"}},f.notes||'');
  fNotes.addEventListener('input',e=>f.notes=e.target.value);
  const content = h('div',{},
    field('Fırsat Başlığı *',fTitle),
    row(field('Müşteri',fCust,true),field('Fırsat',fOpp,true)),
    row(field('Hazırlayan *',prepContainer,true),field('Durum',fSt,true)),
    row(field('Tutar (€)',fAmt,true),field('Talep Tarihi',fCreated,true)),
    row(field('Dead Line',fValid,true),field('Gönderilme Tarihi',fSentDate,true)),
    field('Notlar',fNotes),
    h('div',{style:{display:'flex',gap:'10px'}},
      btn('Kaydet',()=>{if(f.title&&f.preparedBy){if(f.status==='Gönderildi'&&!f.sentDate)f.sentDate=today();saveProp({...f,amount:Number(f.amount)||0},!!item);}},'linear-gradient(135deg,#3b82f6,#6366f1)','#fff','11px 16px',{flex:'1',fontSize:'14px'}),
      btn('İptal',()=>setState({modal:null}),'#21262d','#8b949e','11px 20px',{fontSize:'14px'})
    )
  );
  return modal(item?'Teklifi Düzenle':'Yeni Teklif', content, ()=>setState({modal:null}), '680px');
}

function buildImportModal() {
  let step = 1; // 1: dosya seç, 2: modül seç, 3: sütun eşleştir, 4: önizleme
  let rawData = [];
  let headers = [];
  let selectedModule = 'customers';
  let mapping = {};
  let parsedRows = [];

  const MODULES = {
    customers: {
      label: '👥 Müşteriler',
      fields: [
        {key:'firmName',  label:'Firma Adı *', required:true},
        {key:'sector',    label:'Sektör'},
        {key:'phone',     label:'Telefon'},
        {key:'email',     label:'E-posta'},
        {key:'address',   label:'Adres'},
        {key:'web',       label:'Web Adresi'},
        {key:'notes',     label:'Notlar'},
      ]
    },
    suppliers: {
      label: '🏭 Tedarikçiler',
      fields: [
        {key:'firmName',     label:'Firma Adı *', required:true},
        {key:'supplierType', label:'Tedarikçi Türü'},
        {key:'phone',        label:'Telefon'},
        {key:'email',        label:'E-posta'},
        {key:'address',      label:'Adres'},
        {key:'notes',        label:'Notlar'},
      ]
    },
    opportunities: {
      label: '🎯 Fırsatlar',
      fields: [
        {key:'title',      label:'Başlık *', required:true},
        {key:'value',      label:'Değer (EUR)'},
        {key:'stage',      label:'Aşama'},
        {key:'sector',     label:'Sektör'},
        {key:'assignedTo', label:'Satış Temsilcisi'},
        {key:'dueDate',    label:'Sipariş Tarihi'},
        {key:'notes',      label:'Notlar'},
      ]
    },
    proposals: {
      label: '📄 Teklif Talepleri',
      fields: [
        {key:'title',       label:'Başlık *', required:true},
        {key:'amount',      label:'Tutar (EUR)'},
        {key:'status',      label:'Durum'},
        {key:'preparedBy',  label:'Hazırlayan'},
        {key:'validUntil',  label:'Dead Line'},
        {key:'notes',       label:'Notlar'},
      ]
    },
  };

  const wrap = h('div',{});

  function render() {
    wrap.innerHTML = '';

    // STEP 1: Dosya seç
    if(step===1) {
      const fi = document.createElement('input');
      fi.type='file'; fi.accept='.xlsx,.xls,.csv'; fi.style.display='none';

      fi.addEventListener('change', e => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            let rows = [];
            if(file.name.endsWith('.csv')) {
              // CSV parse
              const text = ev.target.result;
              const lines = text.split('\n').filter(l=>l.trim());
              rows = lines.map(l => l.split(',').map(v=>v.trim().replace(/^"|"$/g,'')));
            } else {
              // Excel parse via SheetJS
              const wb = XLSX.read(ev.target.result, {type:'array'});
              const ws = wb.Sheets[wb.SheetNames[0]];
              rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
            }
            if(rows.length < 2) { showToast('⚠️ Dosya boş veya geçersiz','#d97706'); return; }
            headers = rows[0].map(String);
            rawData = rows.slice(1).filter(r=>r.some(v=>String(v).trim()));
            step=2; render();
          } catch(err) {
            showToast('❌ Dosya okunamadı: '+err.message,'#dc2626');
          }
        };
        if(file.name.endsWith('.csv')) reader.readAsText(file, 'UTF-8');
        else reader.readAsArrayBuffer(file);
      });

      const dropZone = h('div',{
        style:{border:`2px dashed ${G4}`,borderRadius:'14px',padding:'40px 20px',textAlign:'center',cursor:'pointer',background:G,transition:'all .2s'}
      },
        h('div',{style:{fontSize:'48px',marginBottom:'12px'}},'📊'),
        h('div',{style:{fontSize:'16px',fontWeight:'700',color:T1,marginBottom:'6px'}},'Excel veya CSV dosyası seçin'),
        h('div',{style:{fontSize:'13px',color:T3,marginBottom:'20px'}},'.xlsx, .xls, .csv formatları desteklenir'),
        btn('📁 Dosya Seç',()=>fi.click(),'linear-gradient(135deg,#6366f1,#8b5cf6)','#fff','10px 24px',{fontSize:'14px'})
      );
      dropZone.appendChild(fi);
      dropZone.addEventListener('click',e=>{ if(e.target===dropZone||e.target.tagName==='DIV') fi.click(); });
      dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.style.borderColor='#6366f1';dropZone.style.background='rgba(99,102,241,.05)';});
      dropZone.addEventListener('dragleave',()=>{dropZone.style.borderColor=G4;dropZone.style.background=G;});
      dropZone.addEventListener('drop',e=>{
        e.preventDefault();dropZone.style.borderColor=G4;dropZone.style.background=G;
        fi.files=e.dataTransfer.files; fi.dispatchEvent(new Event('change'));
      });

      const tipBox = h('div',{style:{background:G,border:`1px solid ${G4}`,borderRadius:'10px',padding:'14px',marginTop:'16px'}},
        h('div',{style:{fontSize:'12px',fontWeight:'700',color:T2,marginBottom:'8px'}},'💡 Excel nasıl hazırlanmalı?'),
        h('div',{style:{fontSize:'12px',color:T3,lineHeight:'1.6'}},
          '• 1. satır başlıklar olmalı (Firma Adı, Sektör, Telefon...)',h('br'),
          '• 2. satırdan itibaren veriler olmalı',h('br'),
          '• Tarih alanları: GG.AA.YYYY veya YYYY-AA-GG formatında',h('br'),
          '• Türkçe karakterler için dosyayı UTF-8 kaydedin'
        )
      );
      wrap.appendChild(dropZone);
      wrap.appendChild(tipBox);
    }

    // STEP 2: Modül seç
    else if(step===2) {
      wrap.appendChild(h('div',{style:{marginBottom:'16px'}},
        h('div',{style:{fontSize:'13px',color:T3,marginBottom:'4px'}},'✅ Dosya okundu:'),
        h('div',{style:{background:G,border:`1px solid ${G4}`,borderRadius:'8px',padding:'10px 14px',fontSize:'13px',color:T1}},
          h('strong',{},rawData.length+' satır'),', ',headers.length+' sütun bulundu.',
          h('div',{style:{fontSize:'11px',color:T3,marginTop:'4px'}},'Sütunlar: '+headers.slice(0,6).join(', ')+(headers.length>6?' ...':''))
        )
      ));
      wrap.appendChild(h('div',{style:{fontWeight:'700',color:T1,marginBottom:'12px',fontSize:'14px'}},'Hangi modüle aktarılsın?'));
      const grid = h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}});
      Object.entries(MODULES).forEach(([key,mod])=>{
        const card = h('div',{
          style:{background:selectedModule===key?'linear-gradient(135deg,#6366f1,#8b5cf6)':'#f8fafc',border:`2px solid ${selectedModule===key?'#6366f1':'#e2e8f0'}`,borderRadius:'12px',padding:'16px',cursor:'pointer',textAlign:'center',transition:'all .2s'},
          onClick:()=>{selectedModule=key; render();}
        },
          h('div',{style:{fontSize:'28px',marginBottom:'6px'}},mod.label.split(' ')[0]),
          h('div',{style:{fontSize:'13px',fontWeight:'700',color:selectedModule===key?'#fff':T1}},mod.label.split(' ').slice(1).join(' '))
        );
        grid.appendChild(card);
      });
      wrap.appendChild(grid);
      wrap.appendChild(h('div',{style:{height:'16px'}}));
      wrap.appendChild(h('div',{style:{display:'flex',gap:'10px'}},
        btn('← Geri',()=>{step=1;render();},'#21262d','#8b949e','10px 16px'),
        btn('Devam →',()=>{
          mapping={};
          // Otomatik eşleştir: benzer isimler
          const fields=MODULES[selectedModule].fields;
          fields.forEach(f=>{
            const match=headers.find(h=>h.toLowerCase().includes(f.label.toLowerCase().replace(' *','').split(' ')[0]));
            if(match) mapping[f.key]=match;
          });
          step=3; render();
        },'linear-gradient(135deg,#6366f1,#8b5cf6)','#fff','10px 16px',{flex:'1'})
      ));
    }

    // STEP 3: Sütun eşleştir
    else if(step===3) {
      const fields = MODULES[selectedModule].fields;
      wrap.appendChild(h('div',{style:{fontSize:'13px',color:T3,marginBottom:'14px'}},
        'Exceldeki sütunları CRM alanlarıyla eşleştirin. Yıldızlı alanlar zorunludur.'
      ));
      const fieldGrid = h('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}});
      fields.forEach(f=>{
        const sel = document.createElement('select');
        sel.style.cssText=`flex:1;padding:8px 10px;background:#fff;border:1px solid ${G4};border-radius:8px;font-size:13px;color:${T1};outline:none;`;
        [{v:'',l:'— Eşleştirme Yok —'},...headers.map(h=>({v:h,l:h}))].forEach(opt=>{
          const o=document.createElement('option');
          o.value=opt.v; o.textContent=opt.l;
          if(mapping[f.key]===opt.v) o.selected=true;
          sel.appendChild(o);
        });
        sel.onchange=e=>{ if(e.target.value) mapping[f.key]=e.target.value; else delete mapping[f.key]; };
        fieldGrid.appendChild(h('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},
          h('div',{style:{width:'160px',fontSize:'13px',fontWeight:f.required?'700':'400',color:f.required?T1:T3,flexShrink:'0'}},f.label),
          h('div',{style:{color:T4,flexShrink:'0'}},'→'),
          sel
        ));
      });
      wrap.appendChild(fieldGrid);
      wrap.appendChild(h('div',{style:{height:'16px'}}));
      wrap.appendChild(h('div',{style:{display:'flex',gap:'10px'}},
        btn('← Geri',()=>{step=2;render();},'#21262d','#8b949e','10px 16px'),
        btn('Önizle →',()=>{
          const fields=MODULES[selectedModule].fields;
          const reqField=fields.find(f=>f.required&&!mapping[f.key]);
          if(reqField){showToast('⚠️ "'+reqField.label+'" alanını eşleştirin','#d97706');return;}
          // Parse
          parsedRows=rawData.slice(0,500).map(row=>{
            const obj={id:genId(),createdAt:today()};
            Object.entries(mapping).forEach(([key,col])=>{
              const ci=headers.indexOf(col);
              if(ci>=0) obj[key]=String(row[ci]||'').trim();
            });
            return obj;
          }).filter(r=>r[Object.keys(mapping).find(k=>MODULES[selectedModule].fields.find(f=>f.key===k&&f.required))]);
          step=4; render();
        },'linear-gradient(135deg,#6366f1,#8b5cf6)','#fff','10px 16px',{flex:'1'})
      ));
    }

    // STEP 4: Önizleme ve import
    else if(step===4) {
      const fields=MODULES[selectedModule].fields;
      const mapped=fields.filter(f=>mapping[f.key]);
      wrap.appendChild(h('div',{style:{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:'10px',padding:'12px 14px',marginBottom:'16px',fontSize:'13px'}},
        h('strong',{style:{color:'#15803d'}},parsedRows.length+' kayıt'),
        h('span',{style:{color:'#166534'}},' aktarılmaya hazır → '+MODULES[selectedModule].label)
      ));
      // Mini tablo önizleme (ilk 5 kayıt)
      const previewWrap=h('div',{style:{overflowX:'auto',marginBottom:'16px',border:`1px solid ${G4}`,borderRadius:'10px'}});
      const table=h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:'12px'}});
      const thead=h('thead',{});
      const headerRow=h('tr',{style:{background:G}});
      mapped.forEach(f=>{
        headerRow.appendChild(h('th',{style:{padding:'8px 12px',textAlign:'left',fontWeight:'700',color:T2,borderBottom:`1px solid ${G4}`,whiteSpace:'nowrap'}},f.label.replace(' *','')));
      });
      thead.appendChild(headerRow); table.appendChild(thead);
      const tbody=h('tbody',{});
      parsedRows.slice(0,5).forEach((row,i)=>{
        const tr=h('tr',{style:{background:i%2?G:'transparent'}});
        mapped.forEach(f=>{
          tr.appendChild(h('td',{style:{padding:'8px 12px',color:T1,borderBottom:`1px solid ${G4}`,maxWidth:'150px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},String(row[f.key]||'')));
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      previewWrap.appendChild(table);
      if(parsedRows.length>5) previewWrap.appendChild(h('div',{style:{padding:'8px 12px',fontSize:'11px',color:T3}},'... ve '+(parsedRows.length-5)+' kayıt daha'));
      wrap.appendChild(previewWrap);

      // Mükerrer kontrol - firmName bazında
      const DUPE_KEY = {customers:'firmName', suppliers:'firmName', opportunities:'title', proposals:'title'};
      const dupeField = DUPE_KEY[selectedModule]||'firmName';
      const existingNames = new Set((state[selectedModule]||[]).map(x=>(x[dupeField]||'').trim().toLowerCase()));
      const toImport = parsedRows.filter(r=>(r[dupeField]||'').trim());
      const newRows   = toImport.filter(r=>!existingNames.has((r[dupeField]||'').trim().toLowerCase()));
      const skipRows  = toImport.filter(r=> existingNames.has((r[dupeField]||'').trim().toLowerCase()));

      // Özet kutusu
      const summaryBox = h('div',{style:{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:'10px',padding:'12px 14px',marginBottom:'12px',fontSize:'13px'}},
        h('div',{style:{display:'flex',gap:'16px',flexWrap:'wrap'}},
          h('div',{},h('span',{style:{fontWeight:'700',color:'#16a34a'}},newRows.length+' yeni'),h('span',{style:{color:'#4a6080'}},' kayıt eklenecek')),
          skipRows.length ? h('div',{},h('span',{style:{fontWeight:'700',color:'#d97706'}},skipRows.length+' kayıt'),h('span',{style:{color:'#4a6080'}},' zaten var, atlanacak')) : h('span')
        ),
        skipRows.length ? h('div',{style:{marginTop:'8px',fontSize:'11px',color:'#94a3b8'}},
          'Atlananlar: '+skipRows.slice(0,5).map(r=>r[dupeField]).join(', ')+(skipRows.length>5?' ...':'')
        ) : h('span')
      );
      wrap.appendChild(summaryBox);

      const statusDiv=h('div',{style:{display:'none'}});
      wrap.appendChild(h('div',{style:{display:'flex',gap:'10px'}},
        btn('← Geri',()=>{step=3;render();},'#21262d','#8b949e','10px 16px'),
        btn((newRows.length?'✅ '+newRows.length+' Kaydı Ekle':'Eklenecek Kayıt Yok'),async()=>{
          if(!newRows.length){showToast('⚠️ Eklenecek yeni kayıt yok — tümü zaten mevcut.','#d97706');return;}
          statusDiv.style.cssText='display:block;background:#0f2a1a;border:1px solid #10b981;border-radius:8px;padding:12px 14px;color:#4ade80;font-size:13px;margin-top:10px;';
          statusDiv.textContent='⏳ Aktarılıyor...';
          try {
            let count=0;
            for(const row of newRows) {
              await db.collection(selectedModule).doc(row.id).set({...row,...stamp()});
              count++;
              if(count%10===0) statusDiv.textContent=`⏳ ${count}/${newRows.length} kayıt eklendi...`;
            }
            const newDocs=await db.collection(selectedModule).get();
            state[selectedModule]=newDocs.docs.map(d=>({...d.data(),id:d.id}));
            statusDiv.textContent=`✅ ${count} yeni kayıt eklendi${skipRows.length?' · '+skipRows.length+' mükerrer atlandı':''}.`;
            setTimeout(()=>{setState({modal:null});render();},2000);
          } catch(err) {
            statusDiv.style.background='#2a0f0f'; statusDiv.style.borderColor='#ef4444'; statusDiv.style.color='#f87171';
            statusDiv.textContent='❌ Hata: '+err.message;
          }
        },newRows.length?'linear-gradient(135deg,#10b981,#059669)':'#94a3b8','#fff','10px 16px',{flex:'1'})
      ));
      wrap.appendChild(statusDiv);
    }
  }

  render();
  return modal('📥 Excel / CSV İçe Aktar', wrap, ()=>setState({modal:null}), '620px');
}


function buildBackupModal() {
  const fileInput = h('input',{type:'file',accept:'.json',style:{display:'none'}});
  const statusDiv = h('div',{style:{display:'none'}});
  let drag = false;

  async function restoreFromJSON(file) {
    if(!file) return;
    const reader = new FileReader();
    reader.onload = async e => {
      try {
        const d = JSON.parse(e.target.result);
        if(!d.customers) throw new Error('Geçersiz dosya');
        if(!confirm('Mevcut tüm veriler silinip yedekten geri yüklenecek. Emin misiniz?')) return;

        statusDiv.style.display='block';
        statusDiv.style.background='#1a1a0f';
        statusDiv.style.border='1px solid #d97706';
        statusDiv.style.color='#fbbf24';
        statusDiv.textContent='⏳ Yükleniyor…';

        // Firebase'e yaz
        const cols = ['customers','opportunities','proposals','services','maintenances'];
        for(const col of cols) {
          // Önce mevcutları sil
          const snap = await db.collection(col).get();
          for(const doc of snap.docs) await doc.ref.delete();
          // Yenilerini yaz
          for(const item of (d[col]||[])) {
            await db.collection(col).doc(String(item.id)).set(item);
          }
        }
        // State güncelle
        state.customers = d.customers||[];
        state.opportunities = d.opportunities||[];
        state.proposals = d.proposals||[];
        state.services = d.services||[];
        state.maintenances = d.maintenances||[];

        statusDiv.style.background='#0f2a1a';
        statusDiv.style.border='1px solid #10b981';
        statusDiv.style.color='#4ade80';
        statusDiv.textContent='✅ Veri başarıyla geri yüklendi!';
        setTimeout(()=>setState({modal:null}),1500);
      } catch(err) {
        statusDiv.style.display='block';
        statusDiv.style.background='#2a0f0f';
        statusDiv.style.border='1px solid #ef4444';
        statusDiv.style.color='#f87171';
        statusDiv.textContent='❌ Geçersiz dosya. Lütfen doğru JSON yedek dosyasını seçin.';
      }
    };
    reader.readAsText(file);
  }

  fileInput.addEventListener('change', e=>restoreFromJSON(e.target.files[0]));

  const dropZone = h('div',{style:{border:`2px dashed ${G4}`,borderRadius:'10px',padding:'20px',textAlign:'center',cursor:'pointer',background:G,marginBottom:'4px'}},
    h('div',{style:{fontSize:'28px',marginBottom:'6px'}},'📂'),
    h('div',{style:{color:T3,fontSize:'13px'}},'JSON yedek dosyasını sürükleyin veya tıklayın'),
    fileInput
  );
  dropZone.addEventListener('click',()=>fileInput.click());
  dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.style.borderColor='#6366f1';dropZone.style.background='#1c2128';});
  dropZone.addEventListener('dragleave',()=>{dropZone.style.borderColor=G4;dropZone.style.background=G;});
  dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.style.borderColor=G4;dropZone.style.background=G;restoreFromJSON(e.dataTransfer.files[0]);});

  statusDiv.style.padding='10px 14px';
  statusDiv.style.borderRadius='8px';
  statusDiv.style.fontSize='13px';
  statusDiv.style.marginTop='10px';

  const content = h('div',{},
    h('div',{style:{background:'#0f0f0f',borderRadius:'10px',padding:'14px',marginBottom:'16px',border:`1px solid ${G3}`}},
      lbl('Mevcut Veri'),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:'6px',marginTop:'8px'}},
        ...[{l:'Firma',v:state.customers.length,c:'#6366f1'},{l:'Fırsat',v:state.opportunities.length,c:'#f97316'},{l:'Teklif',v:state.proposals.length,c:'#3b82f6'},{l:'T.Servis',v:state.services.length,c:'#06b6d4'},{l:'P.Bakım',v:state.maintenances.length,c:'#10b981'}].map(s=>
          h('div',{style:{textAlign:'center',background:G2,borderRadius:'8px',padding:'8px 2px',border:`1px solid ${G4}`}},
            h('div',{style:{fontSize:'18px',fontWeight:'700',color:s.c}},String(s.v)),
            h('div',{style:{fontSize:'10px',color:T3}},s.l)
          )
        )
      )
    ),
    h('div',{style:{fontWeight:'700',color:T1,marginBottom:'10px',fontSize:'13px'}},'📥 Yedek Al'),
    h('div',{style:{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'18px'}},
      h('button',{onClick:dlJSON,style:{display:'flex',alignItems:'center',gap:'10px',background:G,border:`1px solid ${G3}`,borderRadius:'10px',padding:'12px 14px',cursor:'pointer',width:'100%',fontFamily:"'DM Sans',sans-serif"}},
        h('span',{style:{fontSize:'24px'}},'📄'),
        h('div',{},h('div',{style:{color:'#60a5fa',fontWeight:'700',fontSize:'13px'}},'JSON Yedek İndir'),h('div',{style:{color:T3,fontSize:'11px'}},'Geri yüklenebilir'))
      ),
      h('button',{onClick:dlCSV,style:{display:'flex',alignItems:'center',gap:'10px',background:G,border:`1px solid ${G3}`,borderRadius:'10px',padding:'12px 14px',cursor:'pointer',width:'100%',fontFamily:"'DM Sans',sans-serif"}},
        h('span',{style:{fontSize:'24px'}},'📊'),
        h('div',{},h('div',{style:{color:'#4ade80',fontWeight:'700',fontSize:'13px'}},'Excel/CSV İndir'),h('div',{style:{color:T3,fontSize:'11px'}},'Google Sheets veya Excel'))
      )
    ),
    h('div',{style:{fontWeight:'700',color:T1,marginBottom:'10px',fontSize:'13px'}},'📤 Geri Yükle'),
    dropZone,
    statusDiv,
    h('div',{style:{marginTop:'12px'}}),
    btn('Kapat',()=>setState({modal:null}),'#21262d','#8b949e','10px 16px',{width:'100%'})
  );
  return modal('🗄️ Yedekleme & Geri Yükleme', content, ()=>setState({modal:null}), '460px');
}

// Çeyrek dönem hesapla (Q1=0-2, Q2=3-5, Q3=6-8, Q4=9-11)
function getQuarter(date) {
  return Math.floor(date.getMonth()/3);
}
function getQuarterName(year, q) {
  var names = ["Ocak-Mart","Nisan-Haziran","Temmuz-Eylül","Ekim-Aralık"];
  return names[q]+" "+year;
}

// Rapor için veri hazırla
function prepareReportData() {
  var O=state.opportunities, P=state.proposals, S=state.services, C=state.customers;
  var LOST=["KAÇTI","NO GO","FIRSAT ÖLDÜ"];
  var now=new Date();
  var totalWon=O.filter(function(o){return o.stage==="KAZANILDI";}).reduce(function(a,o){return a+(Number(o.value)||0);},0);
  var totalPipe=O.filter(function(o){return !LOST.includes(o.stage)&&o.stage!=="KAZANILDI";}).reduce(function(a,o){return a+(Number(o.value)||0);},0);
  var totalLost=O.filter(function(o){return LOST.includes(o.stage);}).reduce(function(a,o){return a+(Number(o.value)||0);},0);
  var compTarget=(state.targets&&state.targets.company)||0;
  var targetPct=compTarget>0?Math.round(totalWon/compTarget*100):0;
  var propWon=P.filter(function(p){return p.status==="Onaylandı";}).reduce(function(a,p){return a+(Number(p.amount)||0);},0);
  var propPending=P.filter(function(p){return p.status==="Gönderildi"||p.status==="Hazırlanıyor";}).reduce(function(a,p){return a+(Number(p.amount)||0);},0);
  var tenDaysAgo=new Date(); tenDaysAgo.setDate(tenDaysAgo.getDate()-10);
  var needFollow=O.filter(function(o){if(LOST.includes(o.stage)||o.stage==="KAZANILDI")return false;if(!o.updatedAt&&!o.createdAt)return true;return new Date(o.updatedAt||o.createdAt)<tenDaysAgo;}).length;
  var repData=state.users.filter(function(u){return u.active!==false&&u.hasTarget!==false;}).map(function(u){
    var repO=O.filter(function(o){return o.assignedTo===u.displayName;});
    var won=repO.filter(function(o){return o.stage==="KAZANILDI";});
    var lost=repO.filter(function(o){return LOST.includes(o.stage);});
    var wonVal=won.reduce(function(a,o){return a+(Number(o.value)||0);},0);
    var hitDenom=won.length+lost.length;
    var hitRate=hitDenom>0?Math.round(won.length/hitDenom*100):0;
    var target=(state.targets&&state.targets.reps&&state.targets.reps[u.displayName])||0;
    var targetP=target>0?Math.round(wonVal/target*100):0;
    return {name:u.displayName,total:repO.length,wonCount:won.length,lostCount:lost.length,wonVal:wonVal,hitRate:hitRate,target:target,targetP:targetP};
  });
  var sectorMap={};
  O.forEach(function(o){var s=o.sector||"Diğer";if(!sectorMap[s])sectorMap[s]={val:0,cnt:0,won:0,lost:0};sectorMap[s].val+=Number(o.value)||0;sectorMap[s].cnt++;if(o.stage==="KAZANILDI")sectorMap[s].won++;if(LOST.includes(o.stage))sectorMap[s].lost++;});
  var topSectors=Object.entries(sectorMap).sort(function(a,b){return b[1].val-a[1].val;}).slice(0,7).map(function(e){var winRate=e[1].cnt>0?Math.round(e[1].won/e[1].cnt*100):0;return e[0]+": "+e[1].cnt+" firsat, EUR "+e[1].val.toLocaleString("tr-TR")+", "+e[1].won+" kazanildi, "+e[1].lost+" kacti, win-rate %"+winRate;}).join("\n");
  var stageText=STAGES.map(function(s){var items=O.filter(function(o){return o.stage===s;});if(!items.length)return "";return s+": "+items.length+" adet EUR "+items.reduce(function(a,o){return a+(Number(o.value)||0);},0).toLocaleString("tr-TR");}).filter(Boolean).join("\n");
  var repLines=repData.map(function(r){return "- "+r.name+": "+r.total+" firsat, "+r.wonCount+" kazanildi, "+r.lostCount+" kacti, Hit Rate: %"+r.hitRate+", Pipeline Ciro: EUR "+r.wonVal.toLocaleString("tr-TR")+", Hedef: EUR "+r.target.toLocaleString("tr-TR")+" (%"+r.targetP+")";}).join("\n");
  // Proje büyüklük analizi
  var small=O.filter(function(o){return (Number(o.value)||0)<50000;}).length;
  var mid=O.filter(function(o){var v=Number(o.value)||0;return v>=50000&&v<200000;}).length;
  var large=O.filter(function(o){return (Number(o.value)||0)>=200000;}).length;
  var avgDeal=O.length>0?Math.round(O.reduce(function(a,o){return a+(Number(o.value)||0);},0)/O.length):0;
  var projSize="Kucuk (<50K EUR): "+small+" adet | Orta (50K-200K EUR): "+mid+" adet | Buyuk (>200K EUR): "+large+" adet | Ortalama: EUR "+avgDeal.toLocaleString("tr-TR");
  // Müşteri segmentasyonu
  var custWithOpp=C.filter(function(cu){return O.some(function(o){return o.customerId===cu.id;});}).length;
  var custNoOpp=C.length-custWithOpp;
  var custSegment="Aktif musteri (firmasi var): "+custWithOpp+" | Pasif musteri (firsat yok): "+custNoOpp+" | Toplam firma: "+C.length;
  // Kayıp analizi
  var lostOpps=O.filter(function(o){return LOST.includes(o.stage);});
  var lostBySector={};
  lostOpps.forEach(function(o){var s=o.sector||"Diger";if(!lostBySector[s])lostBySector[s]=0;lostBySector[s]++;});
  var lostSectors=Object.entries(lostBySector).sort(function(a,b){return b[1]-a[1];}).map(function(e){return e[0]+": "+e[1];}).join(", ");
  // Takip analizi
  var stalePipe=O.filter(function(o){if(LOST.includes(o.stage)||o.stage==="KAZANILDI")return false;var d2=new Date(o.updatedAt||o.createdAt||0);return (now-d2)/(1000*60*60*24)>10;});
  var staleVal=stalePipe.reduce(function(a,o){return a+(Number(o.value)||0);},0);
  // Servis analizi
  var svcTotal=S.reduce(function(a,s){return a+(Number(s.amount)||0);},0);
  var svcApproved=S.filter(function(s){return s.status==="Onaylandı";}).reduce(function(a,s){return a+(Number(s.amount)||0);},0);
  return {O,P,S,C,LOST,now,totalWon,totalPipe,totalLost,compTarget,targetPct,propWon,propPending,needFollow,repData,topSectors,stageText,repLines,projSize,custSegment,lostSectors,stalePipe,staleVal,svcTotal,svcApproved,avgDeal,small,mid,large};
}

async function callGeminiReport(systemText, userText, temperature){
  var apiKey=state.geminiKey||"";
  if(!apiKey){showToast("❌ Gemini API Key eksik — 🎯 Hedefler panelinden girin","#dc2626");return null;}
  var url="https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key="+encodeURIComponent(apiKey);
  var resp=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
    systemInstruction:{parts:[{text:systemText}]},
    contents:[{role:"user",parts:[{text:userText}]}],
    tools:[{google_search:{}}],
    generationConfig:{temperature:temperature,maxOutputTokens:8192,thinkingConfig:{thinkingBudget:0}}
  })});
  var data=await resp.json();
  if(data.error){showToast("❌ Gemini API: "+(data.error.message||"hata"),"#dc2626");return null;}
  var cand=(data.candidates||[])[0]||{};
  var parts=(cand.content&&cand.content.parts)||[];
  var text=parts.map(function(p){return p.text||"";}).join("").trim();
  text=text.replace(/^```html\s*/i,"").replace(/^```\s*/,"").replace(/```\s*$/,"").trim();
  var sources="";
  var gm=cand.groundingMetadata;
  if(gm&&gm.groundingChunks&&gm.groundingChunks.length){
    var seen={},items=[];
    gm.groundingChunks.forEach(function(c){
      var w=c.web;if(w&&w.uri&&!seen[w.uri]){seen[w.uri]=1;
        items.push("<li style='margin-bottom:6px;font-size:12px;line-height:1.5'><a href='"+w.uri+"' target='_blank' rel='noopener' style='color:#2563eb;text-decoration:none'>"+(w.title||w.uri)+"</a></li>");}
    });
    if(items.length)sources="<section style='margin-top:28px;padding-top:16px;border-top:1px solid #e2e8f0'><h2 style='color:#1e3a5f;font-size:14px;margin-bottom:10px'>📚 Araştırma Kaynakları (Google)</h2><ul style='padding-left:20px;margin:0'>"+items.join("")+"</ul></section>";
  }
  return {text:text,sources:sources};
}

function checkMonthlyReport(){
  if(!state.currentUser||!state.currentUser.isAdmin)return;
  var now=new Date();
  if(now.getDate()>3)return;
  var isQ=[0,3,6,9].includes(now.getMonth());
  var key=(isQ?"q_":"m_")+now.getFullYear()+"_"+now.getMonth();
  if(localStorage.getItem(key))return;
  setTimeout(function(){
    var notifId='apro-monthly-notif';
    if(document.getElementById(notifId))return;
    var notif=document.createElement("div");
    notif.id=notifId;
    notif.style.cssText="position:fixed;bottom:80px;right:20px;background:#fff;border:2px solid "+(isQ?"#7c3aed":"#2563eb")+";border-radius:14px;padding:16px 20px;box-shadow:0 8px 30px rgba(37,99,235,.2);z-index:9998;max-width:300px;font-family:'Inter',sans-serif;animation:fu .3s ease";

    var titleEl=document.createElement("div");
    titleEl.style.cssText="font-weight:700;font-size:14px;color:#1e2d4a;margin-bottom:6px";
    titleEl.textContent=isQ?"📊 3 Aylık Rapor Zamanı":"📅 Aylık Rapor Zamanı";
    notif.appendChild(titleEl);

    var descEl=document.createElement("div");
    descEl.style.cssText="font-size:12px;color:#64748b;margin-bottom:12px";
    descEl.textContent=isQ?"Yeni çeyrek başladı. Stratejik 3 aylık raporunuzu oluşturun.":"Yeni ay başladı. Aylık raporunuzu oluşturun.";
    notif.appendChild(descEl);

    var rowEl=document.createElement("div");
    rowEl.style.cssText="display:flex;gap:8px";

    function dismiss(){var el=document.getElementById(notifId);if(el)el.remove();}

    var btnOlustur=document.createElement("button");
    btnOlustur.style.cssText="flex:1;background:linear-gradient(135deg,"+(isQ?"#7c3aed,#a855f7":"#2563eb,#1d4ed8")+");color:#fff;border:none;padding:8px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit";
    btnOlustur.textContent="Oluştur";
    btnOlustur.addEventListener("click",function(){
      dismiss();
      localStorage.setItem(key,"1");
      if(isQ) generateQuarterlyReport(); else generateMonthlyReport();
    });

    var btnSonra=document.createElement("button");
    btnSonra.style.cssText="background:#f1f5f9;color:#4a6080;border:1px solid #b0c8e0;padding:8px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit";
    btnSonra.textContent="Sonra";
    btnSonra.addEventListener("click",function(){dismiss();localStorage.setItem(key,"skip");});

    rowEl.appendChild(btnOlustur);
    rowEl.appendChild(btnSonra);
    notif.appendChild(rowEl);
    document.body.appendChild(notif);
  },2500);
}

  const totalWon = O.filter(o=>o.stage==='KAZANILDI').reduce((a,o)=>a+(Number(o.value)||0),0);
  const totalPipe = O.filter(o=>!LOST.includes(o.stage)&&o.stage!=='KAZANILDI').reduce((a,o)=>a+(Number(o.value)||0),0);

    const repO = O.filter(o=>o.assignedTo===u.displayName);
    const won = repO.filter(o=>o.stage==='KAZANILDI').length;

async function openTargetsModal() {
  // Modal açılmadan önce kullanıcı ve hedef verilerini Firebase'den taze çek
  try {
    const [usSnap, tSnap] = await Promise.all([
      db.collection('users').get(),
      db.collection('settings').doc('targets').get()
    ]);
    if(!usSnap.empty) state.users = usSnap.docs.map(d=>({...d.data(), email:d.id}));
    if(tSnap.exists) {
      const td = tSnap.data();
      if(!td.serviceReps) td.serviceReps = {};
      if(!td.serviceCompany) td.serviceCompany = 0;
      state.targets = td;
    }
  } catch(e) { /* bağlantı yoksa mevcut state kullanılır */ }
  setState({modal:{type:'targets', item:null}});
}

function buildAdminModal() {
  let users = [...state.users];

  let editingUser = null; // tam düzenleme modu
  let newU = {email:'',password:'',displayName:'',isAdmin:false};

  function flash(txt, ok=true) {
    if(msgEl) { msgEl.textContent=txt; msgEl.style.color=ok?'#4ade80':'#f87171'; msgEl.style.display='block'; setTimeout(()=>{if(msgEl)msgEl.style.display='none';},3000); }
  }

  async function persistUsers(list) {
    try {
      // Kalan kullanıcıları kaydet (şifre alanı ASLA dokümana yazılmaz — Firebase Auth'ta tutulur)
      for(const u of list) { const {password, ...rest} = u; await db.collection('users').doc(u.email).set(rest); }
      // Silinenleri Firebase'den kaldır
      const deleted = users.filter(ou=>!list.find(nu=>nu.email===ou.email));
      for(const u of deleted) {
        await db.collection('users').doc(u.email).delete();
        // Silme doğrulaması: belge hâlâ varsa hata fırlat
        const check = await db.collection('users').doc(u.email).get({source:'server'});
        if(check.exists) throw new Error('Kullanici silinemedi: '+u.email);
        // Teklif programı erişimini iptal et (fire-and-forget)
        fetch(TEKLIF_USERS_URL, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json', 'x-crm-key': TEKLIF_API_KEY },
          body: JSON.stringify({ email: u.email }),
        }).catch(() => {});
      }
      users = list;
      state.users = list;
      rerender();
    } catch(e) {
      flash('❌ Firebase hatası: '+e.message, false);
      // state.users güncellemeden eski listeyi koru — tutarsızlığı önle

// DASHBOARD YARDIMCI FONKSİYONLARI
